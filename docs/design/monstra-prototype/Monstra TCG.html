<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useRef, useMemo } = React;

  // ---------- ICON HELPER ----------
  // Uses lucide global. Renders an inline SVG by name.
  const Icon = ({ name, size = 16, className = '', stroke = 2 }) => {
    const ref = useRef(null);
    useEffect(() => {
      if (!ref.current) return;
      const icons = window.lucide?.icons || {};
      const def = icons[name] || icons[name?.replace(/(^|-)\w/g, m => m.toUpperCase()).replace(/-/g,'')];
      if (!def) { ref.current.innerHTML = ''; return; }
      const svg = window.lucide.createElement(def);
      svg.setAttribute('width', size); svg.setAttribute('height', size);
      svg.setAttribute('stroke-width', stroke);
      ref.current.innerHTML = ''; ref.current.appendChild(svg);
    }, [name, size, stroke]);
    return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{width:size, height:size}} />;
  };

  // ============================================================
  // BACKEND API — conexión con el backend del TPI (Spring Boot)
  // Endpoints reales mapeados a partir de BE/.../controllers/*
  //   REST:
  //     GET  /ping
  //     POST /api/auth/login           { username, password } -> { token, username }
  //     POST /api/auth/register        { username, email, password }
  //     GET  /api/decks                -> List<DeckSummaryDTO>
  //     GET  /api/decks/{id}           -> DeckResponseDTO
  //     POST /api/decks                DeckRequestDTO -> DeckResponseDTO
  //     POST /api/matches              CreateMatchRequestDTO -> { matchId }
  //     GET  /api/matches/{id}/state   header X-Player-Id -> GameStateResponseDTO
  //     GET  /api/matches/{id}/chat    -> List<ChatMessageResponse>
  //     GET  /api/rankings             -> Slice<RankingDto>
  //     GET  /api/users/me/history     -> Slice<MatchHistoryDto>
  //     GET  /api/users/{u}/honor      -> Map<HonorType, Integer>
  //     GET  /api/users/{u}/status     -> UserStatusResponse
  //   STOMP (SockJS sobre /ws):
  //     pub /app/match/{id}/action    header playerId, payload ActionRequestDTO
  //     pub /app/chat/{id}            payload ChatMessageRequest
  //     sub /topic/match/{id}/player/{playerId}
  //     sub /topic/chat/{id}
  // ============================================================
  const BackendAPI = (() => {
    const API_BASE = (window.__API_BASE__ || localStorage.getItem('monstra.apiBase') || 'http://localhost:8080').replace(/\/$/, '');
    const WS_PATH = '/ws';

    const TOKEN_KEY = 'monstra.jwt';
    const USER_KEY = 'monstra.user';
    const PLAYER_KEY = 'monstra.playerId';

    const getToken = () => { try { return localStorage.getItem(TOKEN_KEY); } catch { return null; } };
    const getUser  = () => { try { return JSON.parse(localStorage.getItem(USER_KEY) || 'null'); } catch { return null; } };
    const getPlayerId = () => { try { return localStorage.getItem(PLAYER_KEY); } catch { return null; } };
    const setSession = (token, user, playerId) => {
      try {
        if (token)    localStorage.setItem(TOKEN_KEY, token);  else localStorage.removeItem(TOKEN_KEY);
        if (user)     localStorage.setItem(USER_KEY, JSON.stringify(user)); else localStorage.removeItem(USER_KEY);
        if (playerId) localStorage.setItem(PLAYER_KEY, playerId); else localStorage.removeItem(PLAYER_KEY);
      } catch {}
      window.dispatchEvent(new Event('monstra:auth'));
    };
    const setApiBase = (v) => { try { localStorage.setItem('monstra.apiBase', v); } catch {}; location.reload(); };

    const apiFetch = async (path, opts = {}) => {
      const url = path.startsWith('http') ? path : `${API_BASE}${path}`;
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      const token = getToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const ctrl = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), opts.timeout || 8000);
      let r;
      try { r = await fetch(url, { ...opts, headers, signal: ctrl.signal }); }
      finally { clearTimeout(timer); }
      const ct = r.headers.get('content-type') || '';
      const body = ct.includes('json') ? await r.json().catch(()=>null) : await r.text().catch(()=>null);
      if (!r.ok) {
        const err = new Error(typeof body === 'string' && body ? body : (body?.message || `HTTP ${r.status}`));
        err.status = r.status; err.body = body;
        throw err;
      }
      return body;
    };

    return {
      API_BASE,
      get WS_URL() { return `${API_BASE}${WS_PATH}`; },
      getToken, getUser, getPlayerId, setSession, setApiBase, apiFetch,

      ping: () => apiFetch('/ping'),

      auth: {
        login: async (username, password) => {
          const res = await apiFetch('/api/auth/login', { method:'POST', body: JSON.stringify({ username, password }) });
          // Sin endpoint dedicado de playerId: usamos el username como id de jugador para X-Player-Id y headers STOMP
          setSession(res.token, { username: res.username }, res.username);
          return res;
        },
        register: (username, email, password) =>
          apiFetch('/api/auth/register', { method:'POST', body: JSON.stringify({ username, email, password }) }),
        logout: () => setSession(null, null, null),
      },

      decks: {
        list: () => apiFetch('/api/decks'),
        get:  (id) => apiFetch(`/api/decks/${id}`),
        create: (deck) => apiFetch('/api/decks', { method:'POST', body: JSON.stringify(deck) }),
      },

      matches: {
        create: (body) => apiFetch('/api/matches', { method:'POST', body: JSON.stringify(body) }),
        state:  (matchId) => apiFetch(`/api/matches/${matchId}/state`, {
                  headers: { 'X-Player-Id': getPlayerId() || '' }
                }),
        chatHistory: (matchId) => apiFetch(`/api/matches/${matchId}/chat`),
      },

      rankings: (page=0, size=10) => apiFetch(`/api/rankings?page=${page}&size=${size}`),
      history:  (page=0, size=10) => apiFetch(`/api/users/me/history?page=${page}&size=${size}`),

      profile: {
        honor:  (username) => apiFetch(`/api/users/${username}/honor`),
        status: (username) => apiFetch(`/api/users/${username}/status`),
      },

      // STOMP sobre SockJS — devuelve el client o null si las libs no están disponibles
      connectStomp: ({ onConnect, onError, debug=false } = {}) => {
        const StompNS = window.StompJs;
        if (!StompNS || !window.SockJS) { onError?.(new Error('STOMP/SockJS no cargado')); return null; }
        const token = getToken();
        const client = new StompNS.Client({
          webSocketFactory: () => new window.SockJS(`${API_BASE}${WS_PATH}`),
          reconnectDelay: 5000,
          heartbeatIncoming: 10000,
          heartbeatOutgoing: 10000,
          connectHeaders: token ? { Authorization: `Bearer ${token}` } : {},
          debug: debug ? (s) => console.log('[STOMP]', s) : () => {},
          onConnect:    () => onConnect?.(client),
          onStompError: (frame) => onError?.(new Error(frame?.headers?.message || 'STOMP error')),
          onWebSocketError: (e) => onError?.(e),
        });
        client.activate();
        return client;
      },
    };
  })();

  // Hook: estado del backend (checking | online | offline)
  const useBackendStatus = () => {
    const [status, setStatus] = useState('checking');
    useEffect(() => {
      let cancelled = false;
      const check = async () => {
        try { await BackendAPI.ping(); if (!cancelled) setStatus('online'); }
        catch { if (!cancelled) setStatus('offline'); }
      };
      check();
      const t = setInterval(check, 15000);
      return () => { cancelled = true; clearInterval(t); };
    }, []);
    return status;
  };

  // Hook: sesión actual (usuario logueado, token)
  const useAuth = () => {
    const [user, setUser] = useState(BackendAPI.getUser());
    useEffect(() => {
      const h = () => setUser(BackendAPI.getUser());
      window.addEventListener('monstra:auth', h);
      return () => window.removeEventListener('monstra:auth', h);
    }, []);
    return {
      user,
      login:    (u, p) => BackendAPI.auth.login(u, p),
      register: (u, e, p) => BackendAPI.auth.register(u, e, p),
      logout:   () => BackendAPI.auth.logout(),
    };
  };

  // Hook genérico: cargar de un endpoint con fallback a mock si falla
  const useApiData = (loader, fallback, deps = []) => {
    const [data, setData] = useState(fallback);
    const [source, setSource] = useState('loading'); // loading | live | mock | error
    useEffect(() => {
      let cancelled = false;
      setSource('loading');
      (async () => {
        try {
          const r = await loader();
          if (cancelled) return;
          setData(r); setSource('live');
        } catch (e) {
          if (cancelled) return;
          setData(fallback); setSource('mock');
        }
      })();
      return () => { cancelled = true; };
    }, deps);
    const reload = async () => {
      try { const r = await loader(); setData(r); setSource('live'); }
      catch { setData(fallback); setSource('mock'); }
    };
    return { data, source, reload };
  };

  // ---------- TYPE SYSTEM (original, non-branded) ----------
  const TYPES = {
    fire:    { label: 'Fuego',     color: '#ff6a3d', soft: 'rgba(255,106,61,.18)',  ring: 'rgba(255,106,61,.55)',  glyph: 'flame'      },
    water:   { label: 'Agua',      color: '#4da3ff', soft: 'rgba(77,163,255,.18)',  ring: 'rgba(77,163,255,.55)',  glyph: 'droplet'    },
    grass:   { label: 'Planta',    color: '#7bd66a', soft: 'rgba(123,214,106,.18)', ring: 'rgba(123,214,106,.55)', glyph: 'leaf'       },
    elec:    { label: 'Eléctrico', color: '#ffd23d', soft: 'rgba(255,210,61,.20)',  ring: 'rgba(255,210,61,.55)',  glyph: 'zap'        },
    psy:     { label: 'Psíquico',  color: '#c97bff', soft: 'rgba(201,123,255,.18)', ring: 'rgba(201,123,255,.55)', glyph: 'sparkles'   },
    fight:   { label: 'Lucha',     color: '#ff9a3d', soft: 'rgba(255,154,61,.18)',  ring: 'rgba(255,154,61,.55)',  glyph: 'swords'     },
    dark:    { label: 'Sombra',    color: '#9aa0c9', soft: 'rgba(154,160,201,.18)', ring: 'rgba(154,160,201,.55)', glyph: 'moon'       },
    metal:   { label: 'Metal',     color: '#b8c3d6', soft: 'rgba(184,195,214,.18)', ring: 'rgba(184,195,214,.55)', glyph: 'shield'     },
  };

  // Original creature roster — "Set MX1" (146 cartas, paralelo a la estructura XY1)
  // category: 'pokemon' | 'trainer' | 'tool' | 'stadium' | 'energy'
  // trainerKind: 'supporter' | 'item' | 'ace-spec' (solo si trainer)
  const CARDS = [
    // ---- POKÉMON ----
    { id:'MX1-001', name:'Pyroclaw',   category:'pokemon', type:'fire',  hp:120, stage:'Etapa 1', evolvesFrom:'Cinderpaw', atk:{name:'Garra Ígnea', dmg:60, cost:['fire','fire']},  weak:'water', res:'grass', retreat:2, rarity:'rara' },
    { id:'MX1-002', name:'Volticub',   category:'pokemon', type:'elec',  hp: 70, stage:'Básico',  atk:{name:'Chispazo',     dmg:30, cost:['elec']},          weak:'fight', res:'metal', retreat:1, rarity:'común' },
    { id:'MX1-003', name:'Aquadrake',  category:'pokemon', type:'water', hp:110, stage:'Etapa 1', evolvesFrom:'Tideling', atk:{name:'Ola Glacial',  dmg:50, cost:['water','water']}, weak:'elec',  res:'fire',  retreat:2, rarity:'rara' },
    { id:'MX1-004', name:'Psyborn-MX', category:'pokemon', type:'psy',   hp:170, stage:'Básico-MX', atk:{name:'Onda Mental',  dmg:80, cost:['psy','psy','psy']}, weak:'dark',  res:'fight', retreat:2, rarity:'ultra-rara' },
    { id:'MX1-005', name:'Florapod',   category:'pokemon', type:'grass', hp: 80, stage:'Básico',  atk:{name:'Látigo',       dmg:30, cost:['grass']},          weak:'fire',  res:'water', retreat:1, rarity:'común' },
    { id:'MX1-006', name:'Granitor',   category:'pokemon', type:'fight', hp:130, stage:'Etapa 1', atk:{name:'Puño Sísmico', dmg:70, cost:['fight','fight','fight']}, weak:'psy', res:'elec', retreat:3, rarity:'rara' },
    { id:'MX1-007', name:'Umbrith',    category:'pokemon', type:'dark',  hp: 90, stage:'Básico',  atk:{name:'Acecho',       dmg:40, cost:['dark','dark']},   weak:'fight', res:'psy',  retreat:1, rarity:'rara' },
    { id:'MX1-008', name:'Ferralox',   category:'pokemon', type:'metal', hp:140, stage:'Etapa 2', evolvesFrom:'Granitor', atk:{name:'Embestida',    dmg:80, cost:['metal','metal','metal']}, weak:'fire', res:'grass', retreat:3, rarity:'épica' },
    { id:'MX1-009', name:'Sparkit',    category:'pokemon', type:'elec',  hp: 60, stage:'Básico',  atk:{name:'Estática',     dmg:20, cost:['elec']},          weak:'fight', res:'metal', retreat:1, rarity:'común' },
    { id:'MX1-010', name:'Mirelune',   category:'pokemon', type:'psy',   hp: 70, stage:'Básico',  atk:{name:'Hipno-Pulso',  dmg:30, cost:['psy']},           weak:'dark',  res:'fight', retreat:1, rarity:'común' },
    { id:'MX1-011', name:'Tideling',   category:'pokemon', type:'water', hp: 60, stage:'Básico',  atk:{name:'Burbuja',      dmg:20, cost:['water']},         weak:'elec',  res:'fire',  retreat:1, rarity:'común' },
    { id:'MX1-012', name:'Verdantyr',  category:'pokemon', type:'grass', hp:150, stage:'Etapa 2', evolvesFrom:'Florapod', atk:{name:'Tormenta Hoja',dmg:90,cost:['grass','grass','grass']}, weak:'fire', res:'water', retreat:2, rarity:'legendaria' },
    { id:'MX1-013', name:'Cinderpaw',  category:'pokemon', type:'fire',  hp: 60, stage:'Básico',  atk:{name:'Brasa',        dmg:20, cost:['fire']},          weak:'water', res:'grass', retreat:1, rarity:'común' },
    { id:'MX1-014', name:'Voidshard',  category:'pokemon', type:'dark',  hp:120, stage:'Etapa 1', atk:{name:'Eclipse',      dmg:60, cost:['dark','dark','dark']}, weak:'fight', res:'psy', retreat:2, rarity:'épica' },

    // ---- ENTRENADORES (SUPPORTER) ----
    { id:'MX1-101', name:'Dra. Robles',   category:'trainer', trainerKind:'supporter', text:'Descartá tu mano. Robá 7 cartas.',                   rarity:'rara' },
    { id:'MX1-102', name:'Líder Iván',    category:'trainer', trainerKind:'supporter', text:'Robá hasta tener 6 cartas en tu mano.',             rarity:'común' },
    { id:'MX1-103', name:'Reportera Mei', category:'trainer', trainerKind:'supporter', text:'Robá 4 cartas.',                                     rarity:'común' },

    // ---- ENTRENADORES (ITEM) ----
    { id:'MX1-110', name:'Botiquín Rápido', category:'trainer', trainerKind:'item', text:'Cura 30 de daño a 1 Pokémon.',                rarity:'común' },
    { id:'MX1-111', name:'Búsqueda Audaz',  category:'trainer', trainerKind:'item', text:'Buscá en tu mazo un Pokémon Básico.',          rarity:'común' },
    { id:'MX1-112', name:'Intercambio',     category:'trainer', trainerKind:'item', text:'Mezclá tu mano con tu mazo y robá 4.',         rarity:'común' },

    // ---- AS TÁCTICO (máx. 1 por mazo) ----
    { id:'MX1-115', name:'Computadora Lunar', category:'trainer', trainerKind:'ace-spec', text:'Buscá cualquier 1 carta de tu mazo a tu mano.', rarity:'ace-spec' },

    // ---- HERRAMIENTAS POKÉMON ----
    { id:'MX1-120', name:'Banda Focal',   category:'tool', text:'El Pokémon equipado tiene −10 a daño recibido.',   rarity:'común' },
    { id:'MX1-121', name:'Píldora Ágil',  category:'tool', text:'Costo de retirada −1 energía.',                    rarity:'común' },

    // ---- ESTADIOS ----
    { id:'MX1-130', name:'Coliseo Tórrido', category:'stadium', text:'Pokémon ⚡ fuego dañan +10 al activo.',         rarity:'rara' },
    { id:'MX1-131', name:'Templo Brumoso',  category:'stadium', text:'Pokémon psíquicos curan 10 entre turnos.',     rarity:'rara' },
  ];
  const POKE_CARDS = CARDS.filter(c => c.category === 'pokemon');

  const byId = id => CARDS.find(c => c.id === id);

  // ---------- CARD VISUAL ----------
  // An original card frame (not modeled on any specific TCG layout).
  const EnergyDot = ({ t, size=14 }) => {
    const T = TYPES[t];
    return (
      <span className="inline-flex items-center justify-center rounded-full" style={{width:size, height:size, background:T.color, boxShadow:`0 0 0 1.5px rgba(0,0,0,.35), 0 0 6px ${T.ring}`}}>
        <Icon name={T.glyph} size={Math.round(size*0.6)} className="text-black/70" stroke={2.5} />
      </span>
    );
  };

  const TypeBadge = ({ t }) => {
    const T = TYPES[t];
    return (
      <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wider"
            style={{ background:T.soft, color:T.color, border:`1px solid ${T.ring}` }}>
        <Icon name={T.glyph} size={10} stroke={2.5} />
        {T.label}
      </span>
    );
  };

  // Decorative creature silhouette (abstract glyph — original, not a real creature)
  const CreatureGlyph = ({ t, seed = 1 }) => {
    const T = TYPES[t];
    // Generate a deterministic blob from seed
    const r = (n) => { const x = Math.sin(seed * 9301 + n * 49297) * 233280; return x - Math.floor(x); };
    const pts = Array.from({length:7}, (_,i)=> {
      const a = (i/7) * Math.PI*2;
      const rad = 18 + r(i)*8;
      return [50 + Math.cos(a)*rad, 50 + Math.sin(a)*rad].map(v=>v.toFixed(1)).join(',');
    }).join(' ');
    return (
      <svg viewBox="0 0 100 100" className="w-full h-full">
        <defs>
          <radialGradient id={`g-${t}-${seed}`} cx="50%" cy="40%" r="60%">
            <stop offset="0%" stopColor={T.color} stopOpacity="0.95"/>
            <stop offset="60%" stopColor={T.color} stopOpacity="0.35"/>
            <stop offset="100%" stopColor="#000" stopOpacity="0"/>
          </radialGradient>
        </defs>
        <rect width="100" height="100" fill="url(#g-${t}-${seed})" opacity="0.25"/>
        <polygon points={pts} fill={`url(#g-${t}-${seed})`} stroke={T.color} strokeOpacity="0.6" strokeWidth="0.8"/>
        <circle cx={50 + Math.cos(seed)*8} cy={45 + Math.sin(seed)*4} r="3" fill="#0a0a14" opacity="0.8" />
        <circle cx={50 - Math.cos(seed)*8} cy={45 + Math.sin(seed)*4} r="3" fill="#0a0a14" opacity="0.8" />
      </svg>
    );
  };

  // Card large component
  const CONDITIONS = {
    asleep:    { label:'DORMIDO',    color:'#c97bff', rotate:90,  icon:'moon' },
    confused:  { label:'CONFUNDIDO', color:'#ff5fb0', rotate:180, icon:'help-circle' },
    paralyzed: { label:'PARALIZADO', color:'#ffd23d', rotate:-90, icon:'zap-off' },
    burned:    { label:'QUEMADO',    color:'#ff6a3d', rotate:0,   icon:'flame' },
    poisoned:  { label:'ENVENENADO', color:'#7bd66a', rotate:0,   icon:'biohazard' },
  };

  const Card = ({ card, size='md', onClick, selected, faceDown, energies=[], damage=0, hpMax, condition, tool, draggable, onDragStart, onDragEnd, isTrainer, isStadium, dimmed }) => {
    if (!card && !faceDown) return null;
    const sizes = {
      xs: { w: 56,  h: 78,  pad:'p-1',   name:'text-[8px]',  hp:'text-[8px]',  atk:'hidden' },
      sm: { w: 76,  h: 106, pad:'p-1.5', name:'text-[9px]',  hp:'text-[9px]',  atk:'text-[8px]' },
      md: { w: 96,  h: 136, pad:'p-1.5', name:'text-[11px]', hp:'text-[10px]', atk:'text-[9px]' },
      lg: { w: 132, h: 188, pad:'p-2',   name:'text-[13px]', hp:'text-[11px]', atk:'text-[10px]' },
      xl: { w: 200, h: 284, pad:'p-3',   name:'text-base',   hp:'text-sm',     atk:'text-xs' },
    };
    const S = sizes[size];

    if (faceDown) {
      return (
        <div className="relative rounded-md overflow-hidden card-tilt"
             style={{width:S.w, height:S.h, background:'linear-gradient(135deg,#1a1d3a 0%,#0b0d22 50%,#1a1d3a 100%)', boxShadow:'0 4px 14px -6px rgba(0,0,0,.7), inset 0 0 0 1px rgba(255,255,255,.06)'}}
             onClick={onClick}>
          <div className="absolute inset-1 rounded border border-white/10 grid place-items-center">
            <div className="text-neon-cyan font-display font-bold tracking-widest" style={{fontSize: S.w*0.13}}>M</div>
          </div>
          <div className="absolute inset-0 holo opacity-40" />
        </div>
      );
    }

    // ---- Trainer / Stadium / Tool variant ----
    if (card.category && card.category !== 'pokemon') {
      const palette = card.category === 'trainer' ? (card.trainerKind === 'supporter' ? '#ff5fb0' : card.trainerKind === 'ace-spec' ? '#ffd23d' : '#52f0ff')
                    : card.category === 'stadium' ? '#7bd66a'
                    : '#b8c3d6';
      const tag = card.category === 'trainer'
        ? (card.trainerKind === 'ace-spec' ? 'AS TÁCTICO' : card.trainerKind === 'supporter' ? 'PARTIDARIO' : 'OBJETO')
        : card.category === 'stadium' ? 'ESTADIO' : 'HERRAMIENTA';
      return (
        <div onClick={onClick}
             draggable={draggable} onDragStart={onDragStart} onDragEnd={onDragEnd}
             className={`relative rounded-md overflow-hidden card-tilt cursor-pointer ${S.pad} ${selected ? 'ring-2 ring-neon-lime' : ''} ${dimmed ? 'opacity-40' : ''}`}
             style={{ width:S.w, height:S.h,
                      background:`linear-gradient(160deg, ${palette}33 0%, #0e1024 55%, #0a0c1e 100%)`,
                      boxShadow:`0 6px 16px -8px rgba(0,0,0,.8), inset 0 0 0 1px ${palette}88` }}>
          <div className="relative z-10">
            <div className="flex items-center justify-between gap-1">
              <div className="text-[8px] font-mono uppercase tracking-widest font-bold" style={{color:palette}}>{tag}</div>
              <div className="text-[8px] font-mono text-white/40">{card.id}</div>
            </div>
            <div className={`font-display font-bold leading-tight mt-0.5 truncate ${S.name}`}>{card.name}</div>
          </div>
          <div className="relative mx-auto my-1 rounded-sm overflow-hidden grid place-items-center"
               style={{height: S.h*0.42, background:`radial-gradient(80% 80% at 50% 50%, ${palette}22, #06070f 80%)`, border:`1px solid ${palette}55`}}>
            <Icon name={card.category === 'stadium' ? 'landmark' : card.category === 'tool' ? 'wrench' : (card.trainerKind === 'supporter' ? 'user' : card.trainerKind === 'ace-spec' ? 'star' : 'package')} size={Math.round(S.h*0.18)} className="text-white/85" stroke={1.6} />
            <div className="absolute inset-0 holo opacity-40" />
          </div>
          {size !== 'xs' && (
            <div className="text-[9px] text-white/70 leading-snug px-0.5">{card.text}</div>
          )}
        </div>
      );
    }

    const T = TYPES[card.type];
    const hpRatio = hpMax ? Math.max(0, (hpMax - damage) / hpMax) : 1;
    const cond = condition ? CONDITIONS[condition] : null;
    const rotation = cond ? cond.rotate : 0;
    return (
      <div onClick={onClick}
           draggable={draggable} onDragStart={onDragStart} onDragEnd={onDragEnd}
           className={`relative rounded-md overflow-hidden card-tilt cursor-pointer ${S.pad} ${selected ? 'ring-2 ring-neon-lime' : ''} ${dimmed ? 'opacity-40' : ''}`}
           style={{
             width:S.w, height:S.h,
             background:`linear-gradient(160deg, ${T.soft} 0%, #0e1024 55%, #0a0c1e 100%)`,
             boxShadow:`0 6px 16px -8px rgba(0,0,0,.8), inset 0 0 0 1px ${T.ring}`,
             transform: `rotate(${rotation}deg)`,
             transition: 'transform .3s cubic-bezier(.2,1,.3,1)',
           }}>
        <div className="flex items-start justify-between gap-1 relative z-10">
          <div className={`font-display font-bold leading-tight truncate ${S.name}`} style={{color:'#f3f5ff', maxWidth: S.w-44}}>{card.name}</div>
          <div className={`flex items-center gap-0.5 font-mono ${S.hp}`} style={{color:T.color}}>
            <span className="opacity-60">HP</span>
            <span className="font-bold">{hpMax ? (hpMax - damage) : card.hp}</span>
            {hpMax && <span className="opacity-50">/{hpMax}</span>}
          </div>
        </div>

        {/* HP bar for in-play cards */}
        {hpMax && size !== 'xs' && (
          <div className="h-1 rounded-full bg-white/5 mt-0.5 overflow-hidden relative z-10">
            <div className="h-full transition-all" style={{width:`${hpRatio*100}%`, background: hpRatio > .5 ? '#7bd66a' : hpRatio > .25 ? '#ffd23d' : '#ff3b3b'}} />
          </div>
        )}

        {/* Art window */}
        <div className="relative mx-auto my-1 rounded-sm overflow-hidden" style={{height: S.h*0.42, background: `radial-gradient(80% 80% at 50% 30%, ${T.soft}, #06070f 80%)`, border:`1px solid ${T.ring}`}}>
          <CreatureGlyph t={card.type} seed={parseInt(card.id.replace(/\D/g,'')) || 1} />
          <div className="absolute top-0.5 left-0.5">
            <EnergyDot t={card.type} size={size==='xl'?20:size==='lg'?16:12} />
          </div>
          {size!=='xs' && (
            <div className="absolute bottom-0.5 right-0.5 text-[7px] uppercase tracking-widest font-mono text-white/60">{card.id} · {card.rarity}</div>
          )}
          <div className="absolute inset-0 holo opacity-40" />
        </div>

        {/* Attack */}
        {size !== 'xs' && (
          <div className={`relative z-10 ${S.atk}`}>
            <div className="flex items-center gap-1">
              <div className="flex items-center gap-0.5">
                {card.atk.cost.map((c,i)=> <EnergyDot key={i} t={c} size={size==='xl'?14:10} />)}
              </div>
              <div className="flex-1 truncate font-medium text-white/90">{card.atk.name}</div>
              <div className="font-mono font-bold" style={{color:T.color}}>{card.atk.dmg}</div>
            </div>
            {size === 'xl' && (
              <>
                <div className="mt-2 text-[10px] text-white/50 leading-snug">Inflige {card.atk.dmg} de daño. Si el objetivo tiene un estado, suma +20.</div>
                <div className="mt-2 flex items-center gap-2 text-[9px] font-mono text-white/60">
                  <span>DEB <EnergyDot t={card.weak} size={10} /></span>
                  <span>RES <EnergyDot t={card.res} size={10} /></span>
                  <span className="ml-auto">RET ×{card.retreat ?? 1}</span>
                </div>
              </>
            )}
          </div>
        )}

        {/* Damage counter overlay */}
        {damage > 0 && (
          <div className="absolute top-1 right-1 z-20 grid place-items-center rounded-full font-mono font-bold text-white"
               style={{width:22, height:22, background:'#ff3b3b', boxShadow:'0 0 0 2px #0a0a14, 0 0 12px rgba(255,59,59,.6)'}}>
            <span className="text-[10px]">{damage}</span>
          </div>
        )}

        {/* Condition badge (special) */}
        {cond && (
          <div className="absolute -top-2 -left-2 z-20 flex items-center gap-1 px-1.5 py-0.5 rounded-md text-[8px] font-bold uppercase tracking-wider"
               style={{ transform:`rotate(${-rotation}deg)`, background: cond.color, color:'#0a0a14', boxShadow:`0 0 0 2px #0a0a14, 0 0 12px ${cond.color}88`}}>
            <Icon name={cond.icon} size={9} stroke={2.5} />
            {cond.label}
          </div>
        )}

        {/* Tool attached */}
        {tool && size !== 'xs' && (
          <div className="absolute top-1 right-1 z-20 px-1 py-0.5 rounded text-[8px] font-mono font-bold" style={{background:'#b8c3d6', color:'#0a0a14'}}>
            <Icon name="wrench" size={9} className="inline mr-0.5" stroke={2.5} />HERR
          </div>
        )}

        {/* Energies attached */}
        {energies.length > 0 && (
          <div className="absolute bottom-1 right-1 z-20 flex gap-0.5" style={{transform:`rotate(${-rotation}deg)`, transformOrigin:'center'}}>
            {energies.map((e,i)=> <EnergyDot key={i} t={e} size={size==='xl'?14:10} />)}
          </div>
        )}
      </div>
    );
  };

  // ============================================================
  // ROOT APP
  // ============================================================
  const App = () => {
    const [tab, setTab] = useState('lobby'); // lobby | battle | collection | shop | profile | chat
    const [authOpen, setAuthOpen] = useState(false);
    const [activeMatchId, setActiveMatchId] = useState(null);
    const backendStatus = useBackendStatus();

    const openBattle = (matchId = null) => { setActiveMatchId(matchId); setTab('battle'); };

    return (
      <div className="min-h-screen flex flex-col bg-ink-950">
        <TopBar tab={tab} setTab={setTab} backendStatus={backendStatus} onOpenAuth={()=>setAuthOpen(true)} />
        <div className="flex-1 flex min-h-0">
          {tab === 'lobby'      && <LobbyScreen onPlay={openBattle} backendStatus={backendStatus} onOpenAuth={()=>setAuthOpen(true)} />}
          {tab === 'battle'     && <BattleScreen matchId={activeMatchId} backendStatus={backendStatus} />}
          {tab === 'collection' && <CollectionScreen backendStatus={backendStatus} />}
          {tab === 'shop'       && <ShopScreen />}
          {tab === 'profile'    && <ProfileScreen backendStatus={backendStatus} onOpenAuth={()=>setAuthOpen(true)} />}
          {tab === 'chat'       && <ChatScreen />}
        </div>
        {authOpen && <AuthModal onClose={()=>setAuthOpen(false)} />}
      </div>
    );
  };

  // ---------- AUTH MODAL (POST /api/auth/login | /register) ----------
  const AuthModal = ({ onClose }) => {
    const { login, register } = useAuth();
    const [mode, setMode] = useState('login'); // login | register
    const [username, setUsername] = useState('');
    const [email, setEmail] = useState('');
    const [password, setPassword] = useState('');
    const [apiBase, setApiBaseLocal] = useState(BackendAPI.API_BASE);
    const [busy, setBusy] = useState(false);
    const [err, setErr] = useState(null);

    const submit = async (e) => {
      e.preventDefault();
      setBusy(true); setErr(null);
      try {
        if (mode === 'login') { await login(username, password); onClose(); }
        else { await register(username, email, password); setMode('login'); setErr('Cuenta creada. Iniciá sesión.'); }
      } catch (e2) { setErr(e2.message || 'Error'); }
      finally { setBusy(false); }
    };

    return (
      <div className="fixed inset-0 z-50 grid place-items-center bg-black/70 backdrop-blur-sm p-4" onClick={onClose}>
        <div className="w-full max-w-md rounded-2xl border border-white/10 bg-ink-900 p-6 space-y-4" onClick={e=>e.stopPropagation()}>
          <div className="flex items-center justify-between">
            <div className="font-display text-lg font-bold">{mode === 'login' ? 'Iniciar sesión' : 'Crear cuenta'}</div>
            <button onClick={onClose} className="w-8 h-8 grid place-items-center rounded-md hover:bg-white/5"><Icon name="x" size={16} /></button>
          </div>
          <form onSubmit={submit} className="space-y-3">
            <label className="block">
              <span className="text-xs text-white/60">Usuario</span>
              <input value={username} onChange={e=>setUsername(e.target.value)} required autoFocus
                     className="mt-1 w-full px-3 py-2 rounded-md bg-ink-800 border border-white/10 focus:border-neon-cyan outline-none text-sm" />
            </label>
            {mode === 'register' && (
              <label className="block">
                <span className="text-xs text-white/60">Email</span>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} required
                       className="mt-1 w-full px-3 py-2 rounded-md bg-ink-800 border border-white/10 focus:border-neon-cyan outline-none text-sm" />
              </label>
            )}
            <label className="block">
              <span className="text-xs text-white/60">Contraseña</span>
              <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required
                     className="mt-1 w-full px-3 py-2 rounded-md bg-ink-800 border border-white/10 focus:border-neon-cyan outline-none text-sm" />
            </label>
            <details className="text-xs text-white/60">
              <summary className="cursor-pointer hover:text-white">Configuración avanzada · API base</summary>
              <div className="mt-2 flex gap-2">
                <input value={apiBase} onChange={e=>setApiBaseLocal(e.target.value)}
                       className="flex-1 px-2 py-1.5 rounded-md bg-ink-800 border border-white/10 text-xs font-mono" />
                <button type="button" onClick={()=>BackendAPI.setApiBase(apiBase)}
                        className="px-2.5 py-1.5 rounded-md bg-white/10 hover:bg-white/15 text-xs">Aplicar</button>
              </div>
              <div className="mt-1 font-mono">Actual: {BackendAPI.API_BASE}</div>
            </details>
            {err && <div className="text-xs px-3 py-2 rounded-md bg-rose-500/10 border border-rose-500/30 text-rose-200">{err}</div>}
            <button type="submit" disabled={busy}
                    className="w-full py-2.5 rounded-md font-semibold text-sm text-black disabled:opacity-50"
                    style={{background:'linear-gradient(135deg,#c5ff3d,#52f0ff)'}}>
              {busy ? '...' : (mode === 'login' ? 'Entrar' : 'Crear cuenta')}
            </button>
            <button type="button" onClick={()=>{setMode(mode==='login'?'register':'login'); setErr(null);}}
                    className="w-full text-xs text-white/60 hover:text-white">
              {mode === 'login' ? '¿No tenés cuenta? Registrarte' : '¿Ya tenés cuenta? Iniciar sesión'}
            </button>
          </form>
        </div>
      </div>
    );
  };

  // ---------- TOP BAR ----------
  const TopBar = ({ tab, setTab, backendStatus, onOpenAuth }) => {
    const { user, logout } = useAuth();
    const tabs = [
      { id:'lobby',      label:'Lobby',     icon:'layout-dashboard' },
      { id:'battle',     label:'Partida',   icon:'swords' },
      { id:'collection', label:'Deck',      icon:'layers' },
      { id:'shop',       label:'Sobres',    icon:'package' },
      { id:'chat',       label:'Comunidad', icon:'message-square' },
      { id:'profile',    label:'Perfil',    icon:'user' },
    ];
    const statusMeta = {
      checking: { color:'bg-amber-400', label:'Verificando BE' },
      online:   { color:'bg-emerald-400 animate-pulse', label:`BE online · ${BackendAPI.API_BASE}` },
      offline:  { color:'bg-rose-500', label:`BE offline · ${BackendAPI.API_BASE}` },
    }[backendStatus] || { color:'bg-white/30', label:'BE ?' };
    return (
      <div className="border-b border-white/5 bg-ink-900/80 backdrop-blur sticky top-0 z-30">
        <div className="px-4 py-2.5 flex items-center gap-4">
          <div className="flex items-center gap-2">
            <div className="w-7 h-7 rounded-md grid place-items-center" style={{background:'linear-gradient(135deg,#c5ff3d,#52f0ff)'}}>
              <span className="font-display font-bold text-black text-sm">M</span>
            </div>
            <div className="leading-tight">
              <div className="font-display font-bold text-sm tracking-wide">MONSTRA <span className="text-neon-lime">TCG</span></div>
              <div className="text-[10px] text-white/40 font-mono">v0.4 · prototipo</div>
            </div>
          </div>

          <nav className="flex items-center gap-1 ml-4">
            {tabs.map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                      className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition
                        ${tab === t.id ? 'bg-white text-black' : 'text-white/70 hover:text-white hover:bg-white/5'}`}>
                <Icon name={t.icon} size={14} />
                {t.label}
              </button>
            ))}
          </nav>

          <div className="ml-auto flex items-center gap-3">
            <div title={statusMeta.label}
                 className="hidden md:flex items-center gap-2 text-[10px] px-2.5 py-1 rounded-md bg-white/5 border border-white/10 font-mono">
              <span className={`w-2 h-2 rounded-full ${statusMeta.color}`}></span>
              <span className="text-white/70">{statusMeta.label}</span>
            </div>
            <div className="hidden md:flex items-center gap-2 text-xs px-2.5 py-1 rounded-md bg-white/5 border border-white/10">
              <Icon name="coins" size={14} className="text-neon-amber" />
              <span className="font-mono font-semibold">1.240</span>
            </div>
            <div className="hidden md:flex items-center gap-2 text-xs px-2.5 py-1 rounded-md bg-white/5 border border-white/10">
              <Icon name="gem" size={14} className="text-neon-cyan" />
              <span className="font-mono font-semibold">86</span>
            </div>
            <button className="w-8 h-8 rounded-md bg-white/5 border border-white/10 grid place-items-center hover:bg-white/10">
              <Icon name="bell" size={14} />
            </button>
            <button onClick={onOpenAuth} title="Configuración / cuenta"
                    className="w-8 h-8 rounded-md bg-white/5 border border-white/10 grid place-items-center hover:bg-white/10">
              <Icon name="settings" size={14} />
            </button>
            {user ? (
              <div className="flex items-center gap-2 pl-2 border-l border-white/10">
                <div className="w-8 h-8 rounded-md grid place-items-center font-display font-bold uppercase"
                     style={{background:'linear-gradient(135deg,#ff5fb0,#c97bff)'}}>{user.username?.[0] || 'U'}</div>
                <div className="leading-tight">
                  <div className="text-xs font-semibold">{user.username}</div>
                  <div className="text-[10px] text-white/40 font-mono">sesión activa</div>
                </div>
                <button onClick={logout} title="Cerrar sesión"
                        className="w-7 h-7 grid place-items-center rounded-md bg-white/5 border border-white/10 hover:bg-rose-500/15">
                  <Icon name="log-out" size={12} />
                </button>
              </div>
            ) : (
              <button onClick={onOpenAuth}
                      className="pl-2 border-l border-white/10 flex items-center gap-2 text-xs font-semibold text-black px-3 py-1.5 rounded-md ml-2"
                      style={{background:'linear-gradient(135deg,#c5ff3d,#52f0ff)'}}>
                <Icon name="log-in" size={14} /> Iniciar sesión
              </button>
            )}
          </div>
        </div>
      </div>
    );
  };

  // ============================================================
  // LOBBY / MATCHMAKING
  // ============================================================
  const LobbyScreen = ({ onPlay, backendStatus, onOpenAuth }) => {
    const { user } = useAuth();
    const [tab, setTab] = useState('rooms'); // rooms | quick
    const [rooms, setRooms] = useState([
      { id:'#A7K-3921', host:'BlazeKnight',  format:'Estándar MX1', mode:'Clasificatoria', mazo:'Sombra', ping:42, status:'WAITING', lvl:31, since:'12s' },
      { id:'#B92-7104', host:'FrostSage',    format:'Estándar MX1', mode:'Casual',         mazo:'Mareas',  ping:78, status:'WAITING', lvl:24, since:'48s' },
      { id:'#C44-2210', host:'VerdMage',     format:'Estándar MX1', mode:'Casual',         mazo:'Bosque',  ping:33, status:'WAITING', lvl:18, since:'2m' },
      { id:'#D01-5589', host:'NyxLord',      format:'Solo Básicos', mode:'Express',        mazo:'Voidshard',ping:55, status:'IN_PROGRESS', lvl:29, since:'8m' },
      { id:'#E12-9981', host:'StaticPaw',    format:'Estándar MX1', mode:'Clasificatoria', mazo:'Spark',   ping:21, status:'WAITING', lvl:35, since:'3s' },
      { id:'#F77-3142', host:'PyroVer',      format:'Estándar MX1', mode:'Casual',         mazo:'Pyro Rush',ping:65, status:'WAITING', lvl:22, since:'1m' },
    ]);
    const [queueing, setQueueing] = useState(false);
    const [queueTime, setQueueTime] = useState(0);
    const [creating, setCreating] = useState(false);
    const [createErr, setCreateErr] = useState(null);

    // GET /api/decks → mazos reales del usuario
    const decksApi = useApiData(
      () => BackendAPI.decks.list(),
      [{ id:null, name:'Pyro Rush (mock)', cards:60, types:['fire','elec','grass','metal'] }],
      [user?.username, backendStatus]
    );
    // GET /api/rankings → top jugadores
    const rankingsApi = useApiData(
      async () => {
        const r = await BackendAPI.rankings(0, 5);
        return r.content || r; // soporta Slice o List
      },
      [
        { username:'BlazeKnight', wins:212 },
        { username:'FrostSage',   wins:198 },
        { username:'VerdMage',    wins:184 },
        { username:'NyxLord',     wins:177 },
        { username:'StaticPaw',   wins:165 },
      ],
      [backendStatus]
    );

    useEffect(() => {
      if (!queueing) return;
      const t = setInterval(()=> setQueueTime(s => s+1), 1000);
      return ()=> clearInterval(t);
    }, [queueing]);

    const formatTime = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

    // POST /api/matches → crea una partida real contra un oponente sparring
    const createRealMatch = async () => {
      setCreating(true); setCreateErr(null);
      try {
        const myDeck = decksApi.data?.[0];
        if (!user) { onOpenAuth(); return; }
        if (!myDeck?.id) throw new Error('Sin mazos guardados. Creá uno en Deck.');
        const body = {
          playerAId: user.username,
          playerBId: 'sparring-bot',
          deckAId: myDeck.id,
          deckBId: myDeck.id, // contra ti mismo si no hay otro deck (sandbox)
        };
        const res = await BackendAPI.matches.create(body);
        onPlay(res.matchId);
      } catch (e) {

    return (

              {(rankingsApi.data || []).slice(0,5).map((r, i) => (

              </div>
              {[
                { name:'TidePal',    status:'En partida',   t:'water', live:true },
                { name:'LeafyKid',   status:'En el lobby',  t:'grass', live:true },
                { name:'StaticPaw',  status:'Buscando rival', t:'elec', live:true },
                { name:'NyxLord',    status:'Ausente · 5min', t:'dark',  live:false },
              ].map(f => (
                <div key={f.name} className="flex items-center gap-3 py-2 border-b border-white/5 last:border-0">
                  <div className="relative">
                    <div className="w-8 h-8 rounded-md grid place-items-center font-bold text-xs" style={{background:TYPES[f.t].soft, color:TYPES[f.t].color, border:`1px solid ${TYPES[f.t].ring}`}}>{f.name.slice(0,1)}</div>
                    <span className={`absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border-2 border-ink-950 ${f.live?'bg-neon-lime':'bg-white/30'}`} />
                  </div>

                    <div className="text-sm font-medium">{f.name}</div>
                    <div className="text-[10px] text-white/40">{f.status}</div>

              ))}

    );
  };

  // ============================================================
  // BATTLE SCREEN
  // ============================================================
  const BattleScreen = ({ matchId, backendStatus }) => {
    const { user } = useAuth();
    const wsRef = useRef(null);
    const [wsConnected, setWsConnected] = useState(false);
    const [serverState, setServerState] = useState(null); // último GameStateResponseDTO recibido
    // ------------- GAME STATE -------------
    const init = () => ({
      // opponent (top, mirrored)
      opp: {
        name: 'BlazeKnight', avatar:'B', lv:31,
        active: { card: byId('MX1-014'), energies:['dark','dark'], dmg:30, cond:null, tool:null },
        bench:  [
          { card: byId('MX1-007'), energies:['dark'], dmg:0, cond:null, tool:null },
          { card: byId('MX1-010'), energies:[], dmg:0, cond:'asleep', tool:null },
          null, null, null
        ],
        prizes: 4,
        deck: 32,
        discard: 5,
        handCount: 6,
      },
      me: {
        name: 'Ash_M',
        active: { card: byId('MX1-001'), energies:['fire','fire'], dmg:20, cond:'burned', tool:byId('MX1-120') },
        bench: [
          { card: byId('MX1-002'), energies:['elec'], dmg:0, cond:null, tool:null },
          { card: byId('MX1-005'), energies:[], dmg:0, cond:null, tool:null },
          { card: byId('MX1-009'), energies:[], dmg:0, cond:null, tool:null },
          null, null
        ],
        prizes: 5,
        deck: 28,
        discard: 7,
      },
      stadium: byId('MX1-130'),
      hand: [byId('MX1-003'), byId('MX1-004'), byId('MX1-006'), byId('MX1-011'), byId('MX1-013'), byId('MX1-101'), byId('MX1-110')],
      phase: 'main', // draw | main | attack | end
      turnNumber: 6,
      turn: 'me',
      log: [
        { who:'sys', txt:'¡Comienza el duelo!' },
        { who:'opp', txt:'BlazeKnight juega Umbrith en banca.' },
        { who:'me',  txt:'Adjuntás Energía Fuego a Pyroclaw.' },
      ],
      chat: [
        { who:'opp', txt:'gl hf 🔥', t:'19:42' },
        { who:'me',  txt:'¡Suerte! 🤝', t:'19:42' },
      ],
    });

    const [g, setG] = useState(init);
    const [selectedHand, setSelectedHand] = useState(null);
    const [focusCard, setFocusCard] = useState(null);
    const [chatInput, setChatInput] = useState('');
    const [dragging, setDragging] = useState(null); // index of hand card being dragged
    const [drops, setDrops] = useState([]); // floating notifications

    const pushLog = (entry) => setG(s => ({...s, log:[...s.log, entry]}));
    const flash = (txt) => {
      const id = Math.random();
      setDrops(d => [...d, {id, txt}]);
      setTimeout(()=> setDrops(d => d.filter(x=>x.id!==id)), 1800);
    };

    const drawCard = () => {
      if (g.me.deck <= 0) return;
      const pool = CARDS.filter(c => c.category === 'pokemon' && !g.hand.find(h=>h.id===c.id));
      const next = pool[Math.floor(Math.random()*pool.length)];
      setG(s => ({ ...s, hand: [...s.hand, next], me: { ...s.me, deck: s.me.deck-1 }, log:[...s.log, {who:'me', txt:`Robás ${next.name}.`}]}));
      flash(`+1 carta: ${next.name}`);
    };

    const endTurn = () => {
      setG(s => ({ ...s, turn: s.turn==='me'?'opp':'me', phase:'main', turnNumber: s.turn==='me' ? s.turnNumber : s.turnNumber+1, log:[...s.log, {who:'sys', txt: s.turn==='me' ? `Turno ${s.turnNumber} — fin del jugador. Comienza el rival.` : `Turno ${s.turnNumber+1} — te toca a vos.`}] }));
    };

    const setPhase = (p) => setG(s => ({...s, phase:p, log:[...s.log, {who:'sys', txt:`Fase: ${p.toUpperCase()}`}]}));

    const doAttack = () => {
      const me = g.me.active;
      const opp = g.opp.active;
      let dmg = me.card.atk.dmg;
      // weakness/resistance
      if (opp.card.weak === me.card.type) dmg *= 2;
      if (opp.card.res === me.card.type) dmg = Math.max(0, dmg - 20);
      // condition bonus per card text
      if (opp.cond) dmg += 20;
      const newDmg = opp.dmg + dmg;
      setG(s => ({
        ...s,
        opp: { ...s.opp, active: { ...s.opp.active, dmg: newDmg } },
        log: [...s.log, { who:'me', txt:`${me.card.name} usa ${me.card.atk.name} → ${dmg} de daño${opp.card.weak===me.card.type?' (DEB ×2)':''}.` }],
      }));
      flash(`¡${dmg} de daño!`);
      // KO?
      if (newDmg >= opp.card.hp) {
        setTimeout(()=> {
          setG(s => ({
            ...s,
            opp: { ...s.opp, active: { card: byId('MX1-007'), energies:['dark'], dmg:0, cond:null, tool:null }, prizes: Math.max(0, s.opp.prizes-1) },
            log: [...s.log, { who:'sys', txt:`¡KO! ${opp.card.name} cae. Toma 1 premio.` }],
          }));
          flash('KO — +1 premio');
        }, 700);
      }
    };

    const retreat = () => {
      const benchIdx = g.me.bench.findIndex(b => b);
      if (benchIdx < 0) return;
      const newActive = g.me.bench[benchIdx];
      const newBench = [...g.me.bench]; newBench[benchIdx] = g.me.active;
      setG(s => ({...s, me:{...s.me, active:newActive, bench:newBench}, log:[...s.log,{who:'me',txt:`Retiraste ${g.me.active.card.name}. Activo ahora: ${newActive.card.name}.`}]}));
    };

    const attachEnergy = () => {
      setG(s => ({...s, me:{...s.me, active:{...s.me.active, energies:[...s.me.active.energies, s.me.active.card.type]}}, log:[...s.log,{who:'me', txt:`Unís Energía ${TYPES[s.me.active.card.type].label} a ${s.me.active.card.name}.`}]}));
      flash('Energía adjuntada');
    };

    const playHandCard = (idx) => {
      const c = g.hand[idx];
      if (!c) return;
      // Trainer: go to discard, log effect; otherwise to bench if possible
      if (c.category === 'trainer') {
        setG(s => {
          const newHand = s.hand.filter((_,i)=>i!==idx);
          return {...s, hand:newHand, me:{...s.me, discard:s.me.discard+1}, log:[...s.log, {who:'me', txt:`Jugás entrenador: ${c.name} — ${c.text}`}]};
        });
        flash(`${c.name} → descarte`);
      } else if (c.category === 'stadium') {
        setG(s => ({...s, stadium:c, hand:s.hand.filter((_,i)=>i!==idx), log:[...s.log,{who:'me',txt:`Ponés ${c.name} como Estadio activo.`}]}));
      } else if (c.category === 'tool') {
        setG(s => ({...s, me:{...s.me, active:{...s.me.active, tool:c}}, hand:s.hand.filter((_,i)=>i!==idx), log:[...s.log,{who:'me',txt:`Equipás ${c.name} a ${s.me.active.card.name}.`}]}));
      } else if (c.category === 'pokemon' && c.stage === 'Básico') {
        const slot = g.me.bench.findIndex(b => !b);
        if (slot < 0) return flash('Banca llena');
        setG(s => {
          const newBench = [...s.me.bench]; newBench[slot] = { card:c, energies:[], dmg:0, cond:null, tool:null };
          return {...s, me:{...s.me, bench:newBench}, hand:s.hand.filter((_,i)=>i!==idx), log:[...s.log,{who:'me',txt:`Ponés ${c.name} en banca (slot ${slot+1}).`}]};
        });
        flash(`${c.name} → banca`);
      } else {
        flash('No se puede jugar aún');
      }
      setSelectedHand(null);
    };

    const sendChat = (txt) => {
      if (!txt.trim()) return;
      const now = new Date().toTimeString().slice(0,5);
      setG(s => ({...s, chat:[...s.chat, {who:'me', txt, t: now}]}));
      setChatInput('');
      // Real → STOMP publish a /app/chat/{matchId}
      if (matchId && wsRef.current?.connected) {
        try {
          wsRef.current.publish({
            destination: `/app/chat/${matchId}`,
            body: JSON.stringify({ sender: user?.username || 'anon', message: txt }),
          });
        } catch (e) { console.warn('STOMP publish failed', e); }
      } else {
        // Sandbox: simulated reply
        setTimeout(()=> setG(s => ({...s, chat:[...s.chat, {who:'opp', txt: ['nice!','😅','gg','que ataque 💥'][Math.floor(Math.random()*4)], t: now}]})), 900);
      }
    };

    // STOMP: conectar y suscribir al chat del match real
    useEffect(() => {
      if (!matchId || backendStatus !== 'online') { setWsConnected(false); return; }
      const client = BackendAPI.connectStomp({
        onConnect: (c) => {
          setWsConnected(true);
          // Subscribe a /topic/chat/{matchId}
          c.subscribe(`/topic/chat/${matchId}`, (frame) => {
            try {
              const msg = JSON.parse(frame.body);
              const t = (msg.timestamp || '').slice(11,16) || new Date().toTimeString().slice(0,5);
              setG(s => {
                const who = msg.sender === user?.username ? 'me' : (msg.sender === 'SYSTEM' ? 'sys' : 'opp');
                // Evitar duplicar mi propio mensaje (lo agregué optimistically)
                if (who === 'me' && s.chat.some(m => m.who==='me' && m.txt === msg.message)) return s;
                return { ...s, chat: [...s.chat, { who, txt: msg.message, t }] };
              });
            } catch {}
          });
          // Subscribe a /topic/match/{matchId}/player/{playerId} para state updates
          if (user?.username) {
            c.subscribe(`/topic/match/${matchId}/player/${user.username}`, (frame) => {
              try { setServerState(JSON.parse(frame.body)); } catch {}
            });
          }
        },
        onError: (e) => { console.warn('STOMP error', e); setWsConnected(false); },
      });
      wsRef.current = client;
      return () => { try { client?.deactivate(); } catch {} ; wsRef.current = null; setWsConnected(false); };
    }, [matchId, backendStatus, user?.username]);

    // Polling: GET /api/matches/{id}/state como fallback / sincronización
    useEffect(() => {
      if (!matchId || backendStatus !== 'online') return;
      let cancelled = false;
      const tick = async () => {
        try { const s = await BackendAPI.matches.state(matchId); if (!cancelled) setServerState(s); } catch {}
      };
      tick();
      const t = setInterval(tick, 5000);
      return () => { cancelled = true; clearInterval(t); };
    }, [matchId, backendStatus]);

    // Cargar historial de chat del match al entrar
    useEffect(() => {
      if (!matchId || backendStatus !== 'online') return;
      BackendAPI.matches.chatHistory(matchId).then(history => {
