    const [filter, setFilter] = useState('all');
    const [deckName, setDeckName] = useState('Mazo nuevo');
    const [deck, setDeck] = useState(['MX1-001','MX1-001','MX1-013','MX1-013','MX1-013','MX1-013','MX1-002','MX1-002','MX1-009','MX1-009','MX1-101','MX1-101','MX1-110','MX1-115','MX1-130']);
    const [category, setCategory] = useState('all'); // all | pokemon | trainer | tool | stadium
    const [saving, setSaving] = useState(false);
    const [saveMsg, setSaveMsg] = useState(null); // { ok:boolean, txt:string }

    // GET /api/decks → lista de mazos guardados (para "cargar mazo")
    const decksApi = useApiData(() => BackendAPI.decks.list(), [], [user?.username, backendStatus]);

    const saveDeckToBackend = async () => {
      setSaving(true); setSaveMsg(null);
      try {
        // DeckRequestDTO: { name, cards: [{ cardId, quantity }] }
        const counts = deck.reduce((acc,id)=>{ acc[id]=(acc[id]||0)+1; return acc; }, {});
        const body = {
          name: deckName,
          cards: Object.entries(counts).map(([cardId, quantity]) => ({ cardId, quantity })),
        };
        const res = await BackendAPI.decks.create(body);
        setSaveMsg({ ok:true, txt:`Guardado en el BE (id=${res.id ?? '?'}).` });
        decksApi.reload();
      } catch (e) {
        setSaveMsg({ ok:false, txt: e.message || 'No se pudo guardar' });
      } finally { setSaving(false); }
    };

    const loadDeckFromBackend = async (id) => {
      try {
        const d = await BackendAPI.decks.get(id);
        const ids = [];
        (d.cards || []).forEach(c => { for (let i=0;i<(c.quantity||1);i++) ids.push(c.cardId); });
        if (ids.length) setDeck(ids);
        if (d.name) setDeckName(d.name);
        setSaveMsg({ ok:true, txt:`Cargado "${d.name}".` });
      } catch (e) {
        setSaveMsg({ ok:false, txt:`No se pudo cargar: ${e.message}` });
      }
    };
    let pool = CARDS;
    if (category !== 'all') pool = pool.filter(c => c.category === category);
    const filtered = filter==='all' ? pool : pool.filter(c => c.type === filter || c.category !== 'pokemon');

    const addToDeck = (id) => {
      const card = byId(id);
      // Validaciones XY1
      if (deck.length >= 60) { return; }
      // máx 1 AS TÁCTICO por mazo
      if (card.trainerKind === 'ace-spec' && deck.some(d => byId(d).trainerKind === 'ace-spec')) { return; }
      // máx 4 cartas con el mismo nombre (excepto energías básicas, que aquí no hay)
      const sameName = deck.filter(d => byId(d).name === card.name).length;
      if (sameName >= 4) { return; }
      setDeck([...deck, id]);
    };
    const removeOne = (id) => {
      const idx = deck.lastIndexOf(id);
      if (idx < 0) return;
      setDeck(deck.filter((_,i)=>i!==idx));
    };

    const deckCount = deck.length;
    const typeMix = deck.reduce((acc, id) => {
      const c = byId(id);
      const t = c.category === 'pokemon' ? c.type : c.category;
      acc[t] = (acc[t]||0) + 1;
      return acc;
    }, {});

    // Validaciones agregadas
    const basicCount = deck.filter(d => byId(d).category==='pokemon' && byId(d).stage==='Básico').length;
    const aceSpecCount = deck.filter(d => byId(d).trainerKind==='ace-spec').length;
    const nameCounts = deck.reduce((acc,d) => { const n = byId(d).name; acc[n]=(acc[n]||0)+1; return acc; }, {});
    const overFour = Object.entries(nameCounts).filter(([_,n]) => n>4).map(([k])=>k);
    const issues = [];
    if (deckCount !== 60) issues.push({ ok:false, txt:`El mazo debe tener 60 cartas (actualmente ${deckCount}).` });
    if (basicCount === 0) issues.push({ ok:false, txt:'Tu mazo debe tener al menos 1 Pokémon Básico.' });
    if (aceSpecCount > 1) issues.push({ ok:false, txt:`Máximo 1 AS TÁCTICO. Tenés ${aceSpecCount}.` });
    if (overFour.length) issues.push({ ok:false, txt:`Pasaste el límite de 4 copias en: ${overFour.join(', ')}.` });
    if (issues.length === 0) issues.push({ ok:true, txt:'Mazo válido según reglamento MX1 ✓' });

    return (
      <div className="flex-1 flex min-h-0">
        <div className="flex-1 flex flex-col min-w-0">
          {/* Header */}
          <div className="px-6 py-4 border-b border-white/5 flex items-end gap-4">
            <div>
              <div className="text-[10px] font-mono uppercase tracking-widest text-white/40">Tu álbum</div>
              <h2 className="font-display text-2xl font-bold">Colección de cartas</h2>
              <div className="text-xs text-white/50 mt-0.5">347 / 482 cartas · 12 sets completados</div>
            </div>
            <div className="ml-auto flex items-center gap-2">
              <div className="flex items-center gap-2 px-3 py-1.5 rounded-md bg-white/5 border border-white/10 text-xs">
                <Icon name="search" size={12} className="text-white/40" />
                <input className="bg-transparent outline-none w-40 text-xs" placeholder="Buscar carta…" />
              </div>
              <button className="px-3 py-1.5 rounded-md text-xs font-medium bg-white/5 border border-white/10 hover:bg-white/10 flex items-center gap-1.5">
                <Icon name="arrow-up-down" size={12} /> Ordenar
              </button>
            </div>
          </div>

          {/* Category + Type filter */}
          <div className="px-6 py-3 border-b border-white/5 space-y-2">
            <div className="flex items-center gap-1.5 flex-wrap">
              <span className="text-[10px] font-mono uppercase tracking-widest text-white/40 mr-1">Tipo de carta</span>
              {[
                {k:'all', l:'Todas', i:'grid-2x2'},
                {k:'pokemon', l:'Pokémon', i:'sparkles'},
                {k:'trainer', l:'Entrenadores', i:'user'},
                {k:'tool', l:'Herramientas', i:'wrench'},
                {k:'stadium', l:'Estadios', i:'landmark'},
              ].map(o => (
                <button key={o.k} onClick={()=>setCategory(o.k)}
                        className={`px-2.5 py-1 rounded-full text-xs font-medium flex items-center gap-1.5 ${category===o.k ? 'bg-white text-black' : 'bg-white/5 text-white/70 hover:bg-white/10'}`}>
                  <Icon name={o.i} size={11}/> {o.l}
                </button>
              ))}
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-[10px] font-mono uppercase tracking-widest text-white/40 mr-1">Elemento</span>
              <button onClick={()=>setFilter('all')}
                      className={`px-2.5 py-1 rounded-full text-xs font-medium ${filter==='all'?'bg-white text-black':'bg-white/5 text-white/70 hover:bg-white/10'}`}>
                Todos
              </button>
              {Object.entries(TYPES).map(([k,T]) => (
                <button key={k} onClick={()=>setFilter(k)}
                        className={`px-2.5 py-1 rounded-full text-xs font-medium flex items-center gap-1.5 ${filter===k?'text-black':'text-white/70 hover:text-white'}`}
                        style={{background: filter===k ? T.color : T.soft, border:`1px solid ${T.ring}`}}>
                  <Icon name={T.glyph} size={11} stroke={2.5} />
                  {T.label}
                </button>
              ))}
            </div>
          </div>

          {/* Grid */}
          <div className="flex-1 overflow-y-auto scrollbar-thin p-6">
            <div className="grid grid-cols-[repeat(auto-fill,minmax(150px,1fr))] gap-4">
              {filtered.map(c => {
                const owned = 1 + (parseInt(c.id.replace(/\D/g,''))) % 4;
                const inDeck = deck.filter(d=>d===c.id).length;
                const sameName = deck.filter(d => byId(d).name === c.name).length;
                const blockedNames = sameName >= 4;
                const blockedAce  = c.trainerKind==='ace-spec' && deck.some(d => byId(d).trainerKind==='ace-spec') && inDeck === 0;
                const blockedFull = deck.length >= 60;
                const blocked = blockedNames || blockedAce || blockedFull;
                return (
                  <div key={c.id} className="group flex flex-col items-center gap-2">
                    <div className="relative" onClick={()=>addToDeck(c.id)}>
                      <Card card={c} size="lg" dimmed={blocked && inDeck === 0} />
                      <div className="absolute -top-1.5 -right-1.5 px-1.5 py-0.5 rounded-full text-[10px] font-mono font-bold bg-ink-900 border border-white/20">×{owned}</div>
                      <div className="absolute inset-0 rounded-md opacity-0 group-hover:opacity-100 transition bg-black/40 grid place-items-center">
                        {blocked
                          ? <span className="px-2 py-1 rounded-md bg-neon-magenta text-white text-[10px] font-bold flex items-center gap-1">
                              <Icon name="alert-triangle" size={11}/>
                              {blockedNames ? 'Máx. 4 copias' : blockedAce ? '1 AS TÁCTICO máx.' : 'Mazo lleno (60)'}
                            </span>
                          : <span className="px-2 py-1 rounded-md bg-neon-lime text-black text-[10px] font-bold flex items-center gap-1">
                              <Icon name="plus" size={11}/> Agregar al mazo
                            </span>}
                      </div>
                    </div>
                    <div className="text-center">
                      <div className="text-xs font-medium">{c.name}</div>
                      <div className="text-[10px] text-white/40 capitalize">{c.rarity}{inDeck>0 && <> · <span className="text-neon-lime">en mazo ×{inDeck}</span></>}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* Deck panel */}
        <aside className="w-[340px] shrink-0 border-l border-white/5 bg-ink-900/50 flex flex-col">
          <div className="p-4 border-b border-white/5">
            <div className="flex items-center justify-between">
              <div className="text-[10px] font-mono uppercase tracking-widest text-white/40">Mazo en edición</div>
              {decksApi.data?.length > 0 && (
                <select onChange={e => e.target.value && loadDeckFromBackend(e.target.value)} defaultValue=""
                        className="text-[10px] font-mono bg-white/5 border border-white/10 rounded px-1.5 py-0.5">
                  <option value="">Cargar…</option>
                  {decksApi.data.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                </select>
              )}
            </div>
            <input value={deckName} onChange={e=>setDeckName(e.target.value)}
                   className="mt-1 w-full bg-transparent font-display font-bold text-lg outline-none border-b border-transparent focus:border-neon-cyan" />
            <div className="mt-3 flex items-center gap-3">
              <div className="font-display font-bold text-3xl">{deckCount}<span className="text-white/30 text-base"> /60</span></div>
              <div className="flex-1">
                <div className="h-2 rounded-full bg-white/5 overflow-hidden">
                  <div className="h-full transition-all" style={{width:`${(deckCount/60)*100}%`, background: deckCount===60 ? '#c5ff3d' : deckCount>60 ? '#ff3b3b' : '#52f0ff'}} />
                </div>
                <div className="text-[10px] text-white/40 mt-1 font-mono">{deckCount < 60 ? `Faltan ${60-deckCount} cartas` : deckCount > 60 ? `Te sobran ${deckCount-60}` : 'Mazo completo'}</div>
              </div>
            </div>
            {/* Type mix bar */}
            <div className="mt-3 h-2 rounded-full overflow-hidden flex">
              {Object.entries(typeMix).map(([t,n])=>{
                const color = TYPES[t] ? TYPES[t].color : (t==='trainer'?'#52f0ff':t==='stadium'?'#7bd66a':'#b8c3d6');
                return <div key={t} style={{width:`${(n/Math.max(1,deckCount))*100}%`, background:color}} />;
              })}
            </div>
            <div className="mt-2 flex flex-wrap gap-1.5">
              {Object.entries(typeMix).map(([t,n])=> TYPES[t]
                ? <span key={t} className="inline-flex items-center gap-1 text-[10px] font-mono"><EnergyDot t={t} size={10} /> {n}</span>
                : <span key={t} className="inline-flex items-center gap-1 text-[10px] font-mono text-white/60"><Icon name={t==='trainer'?'user':t==='stadium'?'landmark':'wrench'} size={9}/> {n}</span>
              )}
            </div>

            {/* Validations */}
            <div className="mt-3 space-y-1">
              {issues.map((iss,i)=>(
                <div key={i} className={`flex items-start gap-1.5 text-[10px] font-mono px-2 py-1 rounded-md ${iss.ok ? 'bg-neon-lime/10 text-neon-lime border border-neon-lime/30' : 'bg-neon-magenta/10 text-neon-magenta border border-neon-magenta/30'}`}>
                  <Icon name={iss.ok?'check-circle':'alert-triangle'} size={11} className="mt-0.5 shrink-0"/>
                  <span>{iss.txt}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="flex-1 overflow-y-auto scrollbar-thin px-3 py-3 space-y-1.5">
            {Array.from(new Set(deck)).map(id => {
              const c = byId(id);
              const n = deck.filter(d=>d===id).length;
              const accentColor = c.category === 'pokemon' ? TYPES[c.type].color
                : c.trainerKind === 'ace-spec' ? '#ffd23d'
                : c.category === 'trainer' ? '#52f0ff'
                : c.category === 'stadium' ? '#7bd66a' : '#b8c3d6';
              return (
                <div key={id} className="flex items-center gap-2 rounded-md bg-white/5 border border-white/10 px-2 py-1.5">
                  {c.category === 'pokemon'
                    ? <EnergyDot t={c.type} size={14} />
                    : <span className="w-3.5 h-3.5 rounded grid place-items-center" style={{background:accentColor}}>
                        <Icon name={c.category==='stadium'?'landmark':c.category==='tool'?'wrench':c.trainerKind==='ace-spec'?'star':'user'} size={9} className="text-black" stroke={2.5}/>
                      </span>
                  }
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-medium truncate">{c.name}</div>
                    <div className="text-[9px] text-white/40 font-mono">
                      {c.category === 'pokemon' ? `${c.stage} · HP ${c.hp}` : (c.trainerKind === 'ace-spec' ? 'AS TÁCTICO' : c.category.toUpperCase())}
                    </div>
                  </div>
                  <div className="flex items-center gap-1">
                    <button onClick={()=>removeOne(id)} className="w-5 h-5 grid place-items-center rounded bg-white/5 hover:bg-white/10"><Icon name="minus" size={10}/></button>
                    <div className="text-xs font-mono font-bold w-5 text-center">{n}</div>
                    <button onClick={()=>addToDeck(id)} className="w-5 h-5 grid place-items-center rounded bg-white/5 hover:bg-white/10"><Icon name="plus" size={10}/></button>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="p-3 border-t border-white/5 space-y-2">
            {saveMsg && (
              <div className={`text-[10px] font-mono px-2 py-1 rounded-md ${saveMsg.ok ? 'bg-emerald-500/10 text-emerald-300 border border-emerald-500/30' : 'bg-rose-500/10 text-rose-200 border border-rose-500/30'}`}>
                {saveMsg.ok ? '✓ ' : '⚠ '}{saveMsg.txt}
              </div>
            )}
            <div className="grid grid-cols-2 gap-2">
              <button onClick={saveDeckToBackend} disabled={saving || !user || issues.some(i=>!i.ok)}
                      title={!user ? 'Iniciá sesión para guardar en el BE' : (issues.some(i=>!i.ok) ? 'Resolvé las validaciones MX1' : 'POST /api/decks')}
                      className="px-3 py-2 rounded-md text-xs font-medium bg-white/5 border border-white/10 hover:bg-white/10 flex items-center justify-center gap-1.5 disabled:opacity-40 disabled:cursor-not-allowed">
                <Icon name="save" size={12} /> {saving ? 'Guardando…' : 'Guardar (BE)'}
              </button>
              <button className="px-3 py-2 rounded-md text-xs font-bold bg-neon-lime text-black flex items-center justify-center gap-1.5">
                <Icon name="swords" size={12} /> Jugar
              </button>
            </div>
            <div className="text-[9px] font-mono text-white/30 text-center">
              {decksApi.source === 'live' ? `${decksApi.data.length} mazo(s) en el BE` : 'BE offline — guardado deshabilitado'}
            </div>
          </div>
        </aside>
      </div>
    );
  };

  // ============================================================
  // SHOP / BOOSTER PACK OPENING
  // ============================================================
  const PACKS = [
    { id:'P1', name:'Llamas del Origen',   theme:'fire',  price:120, sub:'Set base · 11 cartas' },
    { id:'P2', name:'Mareas Profundas',    theme:'water', price:120, sub:'Expansión · 11 cartas' },
    { id:'P3', name:'Tormenta Voltaica',   theme:'elec',  price:150, sub:'Premium · 11 cartas' },
    { id:'P4', name:'Bosque Eterno',       theme:'grass', price:120, sub:'Expansión · 11 cartas' },
    { id:'P5', name:'Niebla del Vacío',    theme:'dark',  price:200, sub:'Legendario · 11 cartas + 1 garantizada' },
  ];

  const ShopScreen = () => {
    const [opening, setOpening] = useState(null); // { pack, revealed: number }
    const [pulled, setPulled] = useState([]);

    const startOpen = (pack) => {
      // pick 5 cards weighted by pack theme
      const themed = CARDS.filter(c => c.type === pack.theme);
      const rest = CARDS.filter(c => c.type !== pack.theme);
      const picks = [
        themed[Math.floor(Math.random()*themed.length)],
        rest[Math.floor(Math.random()*rest.length)],
        themed[Math.floor(Math.random()*themed.length)],
        rest[Math.floor(Math.random()*rest.length)],
        CARDS.filter(c=>c.rarity==='legendaria' || c.rarity==='épica')[Math.floor(Math.random()*4)] || themed[0],
      ];
      setPulled(picks);
      setOpening({ pack, revealed: 0 });
    };

    const next = () => {
      setOpening(o => o && o.revealed < pulled.length ? { ...o, revealed: o.revealed + 1 } : o);
    };
    const close = () => { setOpening(null); setPulled([]); };

    return (
      <div className="flex-1 flex flex-col min-h-0">
        <div className="px-6 py-5 border-b border-white/5">
          <div className="text-[10px] font-mono uppercase tracking-widest text-white/40">Tienda</div>
          <h2 className="font-display text-2xl font-bold">Sobres y expansiones</h2>
        </div>

        <div className="flex-1 overflow-y-auto scrollbar-thin p-6 grid grid-cols-[repeat(auto-fill,minmax(220px,1fr))] gap-4">
          {PACKS.map(p => {
            const T = TYPES[p.theme];
            return (
              <div key={p.id} className="group flex flex-col">
                <div className="relative aspect-[3/4] rounded-lg overflow-hidden border border-white/10 cursor-pointer card-tilt"
                     onClick={()=>startOpen(p)}
                     style={{background:`linear-gradient(160deg, ${T.color} 0%, #0a0c1e 60%)`}}>
                  <div className="absolute inset-0 grid-bg opacity-30" />
                  <div className="absolute inset-x-0 top-4 text-center">
                    <div className="text-[10px] font-mono uppercase tracking-widest text-black/70">MONSTRA · SET 04</div>
                    <div className="font-display font-bold text-xl mt-1 text-white drop-shadow">{p.name}</div>
                  </div>
                  <div className="absolute inset-0 grid place-items-center">
                    <div className="w-20 h-20 rounded-full grid place-items-center float-y" style={{background:'rgba(0,0,0,.35)', boxShadow:`0 0 60px ${T.ring}`}}>
                      <Icon name={T.glyph} size={36} className="text-white" stroke={2} />
                    </div>
                  </div>
                  <div className="absolute bottom-3 left-3 right-3 flex items-end justify-between">
                    <div className="text-[10px] text-white/70 font-mono">{p.sub}</div>
                    <div className="flex items-center gap-1 text-xs font-bold bg-black/40 backdrop-blur px-2 py-1 rounded-md">
                      <Icon name="coins" size={11} className="text-neon-amber" /> {p.price}
                    </div>
                  </div>
                  <div className="absolute inset-0 holo opacity-50" />
                </div>
                <div className="mt-2 flex items-center justify-between">
                  <div>
                    <div className="text-sm font-semibold">{p.name}</div>
                    <div className="text-[10px] text-white/40">Tirada garantizada: rara o superior</div>
                  </div>
                  <button onClick={()=>startOpen(p)} className="px-2.5 py-1.5 rounded-md bg-neon-lime text-black text-xs font-bold flex items-center gap-1">
                    <Icon name="package-open" size={12}/> Abrir
                  </button>
                </div>
              </div>
            );
          })}
        </div>

        {opening && (
          <BoosterOverlay pack={opening.pack} revealed={opening.revealed} pulled={pulled} onNext={next} onClose={close} />
        )}
      </div>
    );
  };

  const BoosterOverlay = ({ pack, revealed, pulled, onNext, onClose }) => {
    const T = TYPES[pack.theme];
    const allRevealed = revealed >= pulled.length;
    return (
      <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur grid place-items-center">
        <div className="relative w-[min(900px,92vw)] rounded-2xl border border-white/10 bg-ink-900 p-8"
             style={{background:`radial-gradient(60% 60% at 50% 0%, ${T.soft}, #0a0c1e 70%)`}}>
          <button onClick={onClose} className="absolute top-4 right-4 w-8 h-8 grid place-items-center rounded-md bg-white/5 border border-white/10 hover:bg-white/10">
            <Icon name="x" size={14}/>
          </button>

          <div className="text-center">
            <div className="text-[10px] font-mono uppercase tracking-widest text-white/40">Abriendo sobre</div>
            <h3 className="font-display text-2xl font-bold mt-1">{pack.name}</h3>
            <div className="text-xs text-white/50 mt-0.5">{revealed} / {pulled.length} reveladas</div>
          </div>

          <div className="mt-8 flex items-center justify-center gap-3 flex-wrap">
            {pulled.map((c, i) => (
              <div key={i}>
                {i < revealed
                  ? <div className="flip"><Card card={c} size="lg" /></div>
                  : <div onClick={onNext} className="relative cursor-pointer card-tilt shimmer overflow-hidden rounded-md"
                         style={{width:132, height:188, background:`linear-gradient(135deg, ${T.color}, #0a0c1e)`, boxShadow:`0 0 30px ${T.ring}`}}>
                      <div className="absolute inset-0 grid place-items-center">
                        <Icon name="sparkles" size={32} className="text-white" />
                      </div>
                    </div>}
              </div>
            ))}
          </div>

          <div className="mt-8 flex items-center justify-center gap-2">
            {!allRevealed && (
              <button onClick={onNext} className="px-5 py-2.5 rounded-md bg-neon-lime text-black font-bold flex items-center gap-2">
                <Icon name="sparkles" size={14}/> Revelar carta
              </button>
            )}
            {allRevealed && (
              <>
                <div className="text-xs text-white/60 mr-4">¡Todas las cartas se añadieron a tu colección!</div>
                <button onClick={onClose} className="px-5 py-2.5 rounded-md bg-white/10 border border-white/10 text-sm font-medium">Volver a la tienda</button>
                <button onClick={()=>{ onClose(); }} className="px-5 py-2.5 rounded-md bg-neon-cyan text-black text-sm font-bold flex items-center gap-1.5">
                  <Icon name="package" size={13}/> Abrir otro
                </button>
              </>
            )}
          </div>
        </div>
      </div>
    );
  };

  // ============================================================
  // PROFILE
  // ============================================================
  const ProfileScreen = ({ backendStatus, onOpenAuth }) => {
    const { user } = useAuth();

    // GET /api/users/me/history → partidas recientes (requiere auth)
    const historyApi = useApiData(
      async () => {
        const s = await BackendAPI.history(0, 8);
        return s.content || s;
      },
      [
        { opponentUsername:'BlazeKnight', deckName:'Pyro Rush',     result:'WIN',  score:'2-1', lpChange:'+24' },
        { opponentUsername:'FrostSage',   deckName:'Tideling Mill', result:'LOSS', score:'1-2', lpChange:'-18' },
        { opponentUsername:'VerdMage',    deckName:'Verdantyr',     result:'WIN',  score:'2-0', lpChange:'+21' },
        { opponentUsername:'NyxLord',     deckName:'Voidshard',     result:'WIN',  score:'2-1', lpChange:'+19' },
        { opponentUsername:'StaticPaw',   deckName:'Spark Combo',   result:'LOSS', score:'0-2', lpChange:'-22' },
      ],
      [user?.username, backendStatus]
    );

    // GET /api/users/{u}/honor — solo si hay user
    const honorApi = useApiData(
      () => user?.username ? BackendAPI.profile.honor(user.username) : Promise.reject('no-user'),
      { GOOD_TEAMMATE: 0, GOOD_SPORT: 0, SHOTCALLER: 0 },
      [user?.username, backendStatus]
    );

    // GET /api/users/{u}/status — visible solo si hay user
    const statusApi = useApiData(
      () => user?.username ? BackendAPI.profile.status(user.username) : Promise.reject('no-user'),
      { online:false, lastSeen:null, penalized:false },
      [user?.username, backendStatus]
    );

    const wins = (historyApi.data || []).filter(m => (m.result || '').toUpperCase().startsWith('W')).length;
    const total = (historyApi.data || []).length;
    const stats = [
      { k:'Partidas', v: String(total), icon:'swords', delta: total ? `${total} cargadas` : 'sin datos' },
      { k:'Victorias', v: String(wins), icon:'trophy', delta: total ? `${Math.round((wins/total)*100)}% win rate` : '—' },
      { k:'Honor (total)', v: String(Object.values(honorApi.data||{}).reduce((a,b)=>a+b,0)), icon:'crown', delta: honorApi.source==='live' ? 'sincronizado' : 'fallback mock' },
      { k:'Estado', v: statusApi.data?.online ? 'Online' : 'Offline', icon:'star', delta: statusApi.data?.penalized ? '⚠ penalizado' : 'sin penalizaciones' },
    ];
    const recent = (historyApi.data || []).map(m => ({
      opp: m.opponentUsername || m.opp || '—',
      deck: m.deckName || m.deck || '—',
      result: (m.result || '').toUpperCase().startsWith('W') ? 'W' : 'L',
      score: m.score || '—',
      lp: m.lpChange || m.lp || '—',
    }));
    return (
      <div className="flex-1 overflow-y-auto scrollbar-thin">
        <div className="max-w-6xl mx-auto p-6 space-y-6">
          {/* Hero */}
          <div className="rounded-2xl border border-white/10 overflow-hidden relative" style={{background:'linear-gradient(120deg,#181a2e,#0e1024)'}}>
            <div className="absolute inset-0 grid-bg opacity-30" />
            <div className="relative p-6 flex items-center gap-6 flex-wrap">
              <div className="w-24 h-24 rounded-2xl grid place-items-center font-display font-bold text-4xl uppercase" style={{background:'linear-gradient(135deg,#ff5fb0,#c97bff)'}}>{user?.username?.[0] || 'A'}</div>
              <div className="flex-1 min-w-0">
                <div className="text-[10px] font-mono uppercase tracking-widest text-white/40">Entrenador · GET /api/users/me/history</div>
                <h2 className="font-display text-3xl font-bold">{user?.username || 'Invitado'}</h2>
                <div className="mt-1 flex flex-wrap items-center gap-2 text-xs">
                  <span className="px-2 py-0.5 rounded-md bg-neon-magenta/20 text-neon-magenta border border-neon-magenta/40 font-mono">{historyApi.source === 'live' ? 'BE LIVE' : 'MOCK'}</span>
                  <span className="text-white/50">·</span>
                  <span className="text-white/70">{statusApi.data?.online ? 'Online ahora' : 'Offline'}</span>
                  {statusApi.data?.penalized && <><span className="text-white/50">·</span><span className="text-rose-300">⚠ penalizado</span></>}
                  {!user && <><span className="text-white/50">·</span>
                    <button onClick={onOpenAuth} className="text-neon-cyan hover:underline">Iniciar sesión</button>
                  </>}
                </div>
                <div className="mt-3 flex items-center gap-3">
                  <div className="flex-1 max-w-md">
                    <div className="flex justify-between text-[10px] font-mono text-white/40 mb-1"><span>NIVEL 28</span><span>2.140 / 3.000 XP</span></div>
                    <div className="h-2 rounded-full bg-white/5 overflow-hidden">
                      <div className="h-full" style={{width:'71%', background:'linear-gradient(90deg,#c5ff3d,#52f0ff)'}} />
                    </div>
                  </div>
                </div>
              </div>
              <button className="px-4 py-2 rounded-md text-sm font-medium bg-white/5 border border-white/10 hover:bg-white/10 flex items-center gap-1.5">
                <Icon name="user-pen" size={13}/> Editar perfil
              </button>
            </div>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            {stats.map(s => (
              <div key={s.k} className="rounded-xl border border-white/10 bg-white/[0.03] p-4">
                <div className="flex items-center justify-between">
                  <div className="text-[10px] font-mono uppercase tracking-widest text-white/40">{s.k}</div>
                  <Icon name={s.icon} size={14} className="text-white/40"/>
                </div>
                <div className="font-display font-bold text-3xl mt-2">{s.v}</div>
                <div className="text-[11px] text-white/50 mt-1">{s.delta}</div>
              </div>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {/* Recent matches */}
            <div className="lg:col-span-2 rounded-xl border border-white/10 bg-white/[0.03] p-4">
              <div className="flex items-center justify-between mb-3">
                <div className="font-semibold text-sm">Partidas recientes</div>
                <button className="text-[11px] text-white/50 hover:text-white">Ver todas</button>
              </div>
              <div className="divide-y divide-white/5">
                {recent.map((m,i)=>(
                  <div key={i} className="flex items-center gap-3 py-2">
                    <div className={`w-7 h-7 rounded-md grid place-items-center font-bold text-xs ${m.result==='W'?'bg-neon-lime text-black':'bg-neon-magenta/20 text-neon-magenta border border-neon-magenta/40'}`}>{m.result}</div>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium">vs {m.opp}</div>
                      <div className="text-[10px] text-white/40 font-mono">Mazo: {m.deck}</div>
                    </div>
                    <div className="text-xs font-mono text-white/60">{m.score}</div>
                    <div className={`text-xs font-mono font-bold w-12 text-right ${m.lp.startsWith('+')?'text-neon-lime':'text-neon-magenta'}`}>{m.lp}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Achievements */}
            <div className="rounded-xl border border-white/10 bg-white/[0.03] p-4">
              <div className="font-semibold text-sm mb-3">Logros</div>
              <div className="space-y-2">
                {[
                  { name:'Coleccionista', desc:'347 cartas únicas', icon:'gem', pct:72 },
                  { name:'Velocista',     desc:'10 partidas ganadas en bajo tiempo', icon:'zap', pct:50 },
                  { name:'Estratega',     desc:'Ganar usando 4 tipos distintos', icon:'brain', pct:100 },
                  { name:'Combo Master',  desc:'KO con +100 daño', icon:'flame', pct:38 },
                ].map(a => (
                  <div key={a.name} className="rounded-md bg-white/[0.03] border border-white/10 p-2 flex items-center gap-3">
                    <div className="w-8 h-8 rounded-md grid place-items-center bg-neon-cyan/10 border border-neon-cyan/30">
                      <Icon name={a.icon} size={14} className="text-neon-cyan"/>
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center justify-between text-xs">
                        <span className="font-medium">{a.name}</span>
                        <span className="font-mono text-white/40">{a.pct}%</span>
                      </div>
                      <div className="text-[10px] text-white/40 truncate">{a.desc}</div>
                      <div className="mt-1 h-1 rounded-full bg-white/5 overflow-hidden">
                        <div className="h-full bg-neon-cyan" style={{width:`${a.pct}%`}} />
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  };

  // ============================================================
  // COMMUNITY CHATS
  // ============================================================
  const ROOMS = [
    { id:'r1', name:'#general',           topic:'Charla libre',                unread:0,  members:1284 },
    { id:'r2', name:'#trade-global',      topic:'Comercio entre entrenadores', unread:12, members: 642 },
    { id:'r3', name:'#meta-elite',        topic:'Discusión de mazos top',      unread:3,  members: 218 },
    { id:'r4', name:'#torneo-mayo',       topic:'Bracket y resultados',        unread:0,  members:  88 },
    { id:'r5', name:'#newbies-help',      topic:'Ayuda a nuevos',              unread:1,  members: 467 },
  ];

  const ChatScreen = () => {
    const [room, setRoom] = useState('r2');
    const [draft, setDraft] = useState('');
    const [msgs, setMsgs] = useState({
      r1: [
        { who:'FrostSage',    txt:'Alguien probó el nuevo nerf a Voidshard?', t:'14:21', tone:'water'},
        { who:'Ash_M',        txt:'Sí, le sacaron 20 de daño base. Sigue siendo sólido.', t:'14:22', tone:'fire' },
      ],
      r2: [
        { who:'PyroVer',      txt:'WTB Verdantyr foil — ofrezco 2× Ferralox + 800 monedas', t:'13:02', tone:'fire'},
        { who:'LeafyKid',     txt:'Tengo Verdantyr no foil, te interesa?', t:'13:04', tone:'grass'},
        { who:'Ash_M',        txt:'Yo busco Aquadrake. ¿Alguien tiene duplicado?', t:'13:08', tone:'fire'},
        { who:'TidePal',      txt:'Acabo de abrir uno hace 10 min, hablemos por DM', t:'13:11', tone:'water'},
      ],
      r3: [
        { who:'MetaWatcher',  txt:'El meta actual: 40% Sombra, 25% Eléctrico, 18% Fuego.', t:'10:50', tone:'dark'},
        { who:'StaticPaw',    txt:'Conté 7 Voidshard en top 16 anoche.', t:'10:54', tone:'elec'},
      ],
      r4: [
        { who:'MOD',          txt:'Bracket actualizado: cuartos a las 21h.', t:'09:00', tone:'metal'},
      ],
      r5: [
        { who:'NewbyAna',     txt:'¿Cómo cuento las energías necesarias?', t:'15:30', tone:'psy'},
        { who:'HelperBot',    txt:'Mirá los símbolos en la esquina inferior izquierda de cada ataque 👌', t:'15:31', tone:'grass'},
      ],
    });

    const send = () => {
      if (!draft.trim()) return;
      setMsgs(m => ({ ...m, [room]: [...m[room], { who:'Ash_M', txt:draft, t:'19:45', tone:'fire' }]}));
      setDraft('');
      setTimeout(()=> {
        setMsgs(m => ({ ...m, [room]: [...m[room], { who:'TidePal', txt:'👋 te escribo por privado', t:'19:45', tone:'water' }]}));
      }, 1100);
    };

    return (
      <div className="flex-1 flex min-h-0">
        {/* Rooms list */}
        <aside className="w-[260px] shrink-0 border-r border-white/5 bg-ink-900/50 flex flex-col">
          <div className="p-4 border-b border-white/5">
            <div className="text-[10px] font-mono uppercase tracking-widest text-white/40">Comunidad</div>
            <h3 className="font-display font-bold text-lg">Salas</h3>
          </div>
          <div className="flex-1 overflow-y-auto scrollbar-thin py-2">
            {ROOMS.map(r => (
              <button key={r.id} onClick={()=>setRoom(r.id)}
                      className={`w-full px-4 py-2 text-left flex items-center gap-2 ${room===r.id ? 'bg-white/5 border-l-2 border-neon-lime' : 'hover:bg-white/[0.03] border-l-2 border-transparent'}`}>
                <Icon name="hash" size={13} className="text-white/40"/>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium truncate">{r.name.replace('#','')}</div>
                  <div className="text-[10px] text-white/40 truncate">{r.topic}</div>
                </div>
                {r.unread > 0 && <span className="px-1.5 py-0.5 rounded-full text-[10px] font-bold bg-neon-magenta text-white">{r.unread}</span>}
              </button>
            ))}
          </div>
          <div className="p-3 border-t border-white/5 text-[10px] text-white/40 font-mono flex items-center gap-2">
            <span className="w-1.5 h-1.5 rounded-full bg-neon-lime" />
            8.421 entrenadores conectados
          </div>
        </aside>

        {/* Channel */}
        <div className="flex-1 flex flex-col min-w-0">
          <div className="px-6 py-3 border-b border-white/5 flex items-center gap-3">
            <Icon name="hash" size={14} className="text-white/40"/>
            <div>
              <div className="font-semibold">{ROOMS.find(r=>r.id===room).name.replace('#','')}</div>
              <div className="text-[10px] text-white/40">{ROOMS.find(r=>r.id===room).topic} · {ROOMS.find(r=>r.id===room).members} miembros</div>
            </div>
            <div className="ml-auto flex items-center gap-2">
              <button className="w-8 h-8 grid place-items-center rounded-md bg-white/5 border border-white/10 hover:bg-white/10"><Icon name="users" size={13}/></button>
              <button className="w-8 h-8 grid place-items-center rounded-md bg-white/5 border border-white/10 hover:bg-white/10"><Icon name="pin" size={13}/></button>
              <button className="w-8 h-8 grid place-items-center rounded-md bg-white/5 border border-white/10 hover:bg-white/10"><Icon name="search" size={13}/></button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto scrollbar-thin px-6 py-4 space-y-3">
            {msgs[room].map((m,i) => {
              const T = TYPES[m.tone] || TYPES.metal;
              return (
                <div key={i} className="flex items-start gap-3">
                  <div className="w-9 h-9 rounded-md grid place-items-center font-bold text-sm" style={{background:T.soft, color:T.color, border:`1px solid ${T.ring}`}}>
                    {m.who.slice(0,1).toUpperCase()}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="font-semibold text-sm">{m.who}</span>
                      <span className="text-[10px] text-white/40 font-mono">{m.t}</span>
                    </div>
                    <div className="text-sm text-white/85 mt-0.5">{m.txt}</div>
                  </div>
                  <button className="opacity-0 hover:opacity-100 text-white/40"><Icon name="more-horizontal" size={14}/></button>
                </div>
              );
            })}
          </div>

          <div className="p-4 border-t border-white/5">
            <form onSubmit={e=>{e.preventDefault(); send();}} className="flex items-center gap-2 rounded-md border border-white/10 bg-white/5 px-3 py-2">
              <Icon name="smile" size={14} className="text-white/40"/>
              <input value={draft} onChange={e=>setDraft(e.target.value)}
                     placeholder={`Mensaje en ${ROOMS.find(r=>r.id===room).name}…`}
                     className="flex-1 bg-transparent outline-none text-sm" />
              <button type="button" className="text-white/40 hover:text-white"><Icon name="paperclip" size={14}/></button>
              <button type="button" className="text-white/40 hover:text-white"><Icon name="image" size={14}/></button>
              <button className="px-3 py-1 rounded-md bg-neon-lime text-black text-xs font-bold flex items-center gap-1">
                <Icon name="send" size={12}/> Enviar
              </button>
            </form>
          </div>
        </div>
      </div>
    );
  };

  // Mount
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
