<div class="absolute inset-0 flex items-center justify-center login-bg">
  <div class="login-card flex flex-col items-center">

    <!-- Logo -->
    <h1 class="login-title">
      POKÉMON
      <span class="login-subtitle">TCG WEB</span>
    </h1>

    <p class="login-desc">
      @if (isLogin) { Iniciá sesión para acceder a tu mazo. }
      @else { Creá tu cuenta y empezá a jugar. }
    </p>

    <!-- Toggle modo -->
    <div class="mode-tabs">
      <button class="tab-btn" [class.tab-active]="isLogin" (click)="mode.set('login')">
        Iniciar sesión
      </button>
      <button class="tab-btn" [class.tab-active]="!isLogin" (click)="mode.set('register')">
        Registrarse
      </button>
    </div>

    <!-- Formulario -->
    <div class="w-full flex flex-col gap-4 mt-6">

      <!-- Usuario -->
      <div class="field-group">
        <label class="field-label">Usuario</label>
        <input
          id="login-username"
          type="text"
          class="field-input"
          placeholder="Ej: AshRivero"
          autocomplete="username"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
        />
      </div>

      <!-- Email (solo en registro) -->
      @if (!isLogin) {
        <div class="field-group">
          <label class="field-label">Email</label>
          <input
            id="login-email"
            type="email"
            class="field-input"
            placeholder="ash@pokemon.com"
            autocomplete="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
          />
        </div>
      }

      <!-- Contraseña -->
      <div class="field-group">
        <label class="field-label">Contraseña</label>
        <input
          id="login-password"
          type="password"
          class="field-input"
          placeholder="••••••••"
          autocomplete="current-password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          (keyup.enter)="submit()"
        />
      </div>

      <!-- Error message -->
      @if (errorMsg()) {
        <div class="error-banner" role="alert">
          <span>⚠ {{ errorMsg() }}</span>
        </div>
      }

      <!-- Botón submit -->
      <button
        id="login-submit-btn"
        class="submit-btn"
        [disabled]="loading()"
        (click)="submit()"
      >
        @if (loading()) {
          <span class="spinner"></span>
          <span>{{ isLogin ? 'Ingresando...' : 'Registrando...' }}</span>
        } @else {
          <span>{{ isLogin ? 'INGRESAR' : 'CREAR CUENTA' }}</span>
        }
      </button>

    </div>

    <!-- Footer toggle -->
    <div class="login-footer">
      @if (isLogin) {
        ¿No tenés cuenta?
        <button class="link-btn" (click)="toggleMode()">Registrate acá</button>
      } @else {
        ¿Ya tenés cuenta?
        <button class="link-btn" (click)="toggleMode()">Iniciá sesión</button>
      }
    </div>

  </div>
</div>
