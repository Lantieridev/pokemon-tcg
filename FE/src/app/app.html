<div class="h-full w-full relative">
  @if (!currentRoute().startsWith('/battle') || currentRoute().startsWith('/battle-pass')) {
    <app-navbar></app-navbar>
  }

  <main
    class="absolute inset-x-0 bottom-0"
    [style.top.px]="(currentRoute().startsWith('/battle') && !currentRoute().startsWith('/battle-pass')) ? 0 : 92"
  >
    <router-outlet></router-outlet>
  </main>

  <app-toast></app-toast>
</div>
