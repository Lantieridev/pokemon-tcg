<header class="absolute top-0 left-0 right-0 z-40 px-4 pt-2 pb-0 flex items-end gap-3"
        style="height: 64px; background:linear-gradient(180deg, #0d1521 0%, rgba(13,21,33,.6) 100%); border-bottom:2px solid rgba(255,203,5,.18)">
  
  <!-- Brand -->
  <div class="flex items-center gap-2 mb-1.5 shrink-0 cursor-pointer" routerLink="/">
    <div class="w-8 h-8 relative">
      <div class="absolute inset-0 rounded-full"
           style="background: linear-gradient(180deg, var(--p-red) 0 50%, #fff 50% 100%); border:2px solid #1a1010; box-shadow:0 2px 0 #1a1010"></div>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-2 h-2 rounded-full" style="background:#fff; border:1.5px solid #1a1010"></div>
      </div>
    </div>
    <div class="font-display text-[14px] tracking-tight leading-none"
         style="color:var(--p-yellow); text-shadow:1px 1px 0 #1a1010">
      PKMN<br/><span class="text-[10px] tracking-widest" style="color:#fff">TCG</span>
    </div>
  </div>

  <!-- Tab strip -->
  <nav class="flex items-end gap-0 ml-1 min-w-0">
    @for (item of navItems; track item.id) {
      <button
        [routerLink]="item.path"
        class="nav-tab"
        [class.active]="isActive(item.path)"
        style="padding: 8px 12px; letter-spacing: .08em"
      >
        <app-icon [name]="item.icon" svgClass="w-4 h-4"></app-icon>
        <span>{{ item.label }}</span>
        @if (item.adminOnly) {
          <span class="ml-0.5 text-[8px] font-chunky"
                [style.color]="isActive(item.path) ? 'var(--p-red)' : 'var(--p-yellow)'">★</span>
        }
      </button>
    }
  </nav>

  <div class="flex-1 min-w-2"></div>

  <!-- Currency -->
  <div class="flex items-center gap-1.5 mb-1.5 shrink-0">
    <div class="flex items-center gap-1 px-2 py-0.5 rounded-full" style="background:#1a1010; border:2px solid var(--p-yellow)">
      <app-icon name="coin" svgClass="w-3.5 h-3.5" style="color:var(--p-yellow)"></app-icon>
      <span class="font-chunky text-[10px] tnum text-white">12,480</span>
    </div>
    <div class="flex items-center gap-1 px-2 py-0.5 rounded-full" style="background:#1a1010; border:2px solid var(--p-blue)">
      <app-icon name="star" svgClass="w-3.5 h-3.5" style="color:#7aa3ff"></app-icon>
      <span class="font-chunky text-[10px] tnum text-white">340</span>
    </div>
  </div>

  <!-- Player chip -->
  <button routerLink="/profile" class="flex items-center gap-1.5 mb-1.5 px-1.5 pr-2.5 py-0.5 rounded-full transition hover:brightness-110 shrink-0"
          style="background:#fff8e8; border:2px solid #1a1010; box-shadow:0 2px 0 #1a1010; color:#1a1010">
    <div class="w-6 h-6 rounded-full flex items-center justify-center font-chunky text-[9px]"
         style="background:var(--p-blue); color:#fff; border:1.5px solid #1a1010">
      AR
    </div>
    <div class="font-display text-[12px] leading-none">AshRivero</div>
  </button>
</header>
