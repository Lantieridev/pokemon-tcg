<div class="chat-modal">
  <div class="chat-header">
    <div class="friend-info">
      <div class="avatar" style="width: 36px; height: 36px; font-size: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 0; background: rgba(255,255,255,0.1); border-radius: 50%; flex-shrink: 0;">
        @if (isCustomAvatar(friend.avatarIcon)) {
          <img [src]="getAvatarUrl(friend.avatarIcon)" style="width: 100%; height: 100%; object-fit: cover;" />
        }
        @if (!isCustomAvatar(friend.avatarIcon)) {
          {{ getAvatarEmoji(friend.avatarIcon) }}
        }
      </div>
      <span class="username" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;">{{friend.friendUsername}}</span>
    </div>
    <div class="header-actions">
      <button class="close-btn" (click)="onClose()">✕</button>
    </div>
  </div>

  <div class="chat-messages">
    @for (msg of messages; track msg) {
      <div
        class="message"
        [class.sent]="msg.receiverUsername === friend.friendUsername"
        [class.received]="msg.senderUsername === friend.friendUsername">
        <div class="bubble">{{msg.content}}</div>
        <div class="time">{{msg.timestamp | date:'shortTime'}}</div>
      </div>
    }
  </div>

  <div class="chat-input">
    <input type="text" [(ngModel)]="newMessage" (keyup.enter)="sendMessage()" placeholder="Escribe un mensaje...">
    <button (click)="sendMessage()">Enviar</button>
  </div>
</div>
