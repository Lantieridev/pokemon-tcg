<div class="toast-container">
  <div *ngFor="let toast of toastService.toasts()" 
       class="toast" 
       [ngClass]="toast.type"
       (click)="toastService.remove(toast.id)">
    <div class="toast-icon">
      <!-- We can use SVG icons here for a more premium look -->
      <ng-container [ngSwitch]="toast.type">
        <svg *ngSwitchCase="'success'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <svg *ngSwitchCase="'error'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        <svg *ngSwitchDefault width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
      </ng-container>
    </div>
    <div class="toast-message">{{ toast.message }}</div>
  </div>
</div>
