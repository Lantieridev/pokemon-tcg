spring.application.name=piii
server.port=8081

#####  SPRING DOC PROPERTIES #####
springdoc.packages-to-scan=ar.edu.utn.frc.tup.piii.controllers
springdoc.show-actuator=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=/swagger-ui.html

## Spring Data Source ##
spring.datasource.url=jdbc:postgresql://localhost:5432/pokemon_tcg
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

## Spring JPA ##
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

## Flyway ##
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

logging.level.root=WARN

##### PokemonTCG External API #####
pokemontcg.api.base-url=https://api.pokemontcg.io/v2

##### Application properties #####
app.name=Pokemon TCG API
app.version=1.0.0
app.desc=API para el juego de cartas de Pokemon
app.url=http://localhost:8081
app.dev-name=Marti & Team
app.dev-email=tuemail@utn.frc.edu.ar
