spring.application.name=piii
server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5432/pokemon_tcg
spring.datasource.username=admin
spring.datasource.password=adminpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

app.name=Pokemon TCG API
app.version=1.0.0
app.desc=API para el juego de cartas de Pokemon
app.url=http://localhost:8081
app.dev-name=Tu Nombre
app.dev-email=tuemail@utn.frc.edu.ar