spring.application.name=piii
server.port=8081
#####  SPRING DOC PROPERTIES #####
springdoc.packages-to-scan=ar.edu.utn.frc.tup.piii.controllers
springdoc.show-actuator=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=/swagger-ui.html

## Spring Data Source ##
# Secrets are read from environment variables in production. The default values
# after ":" are dev-only and must NOT be used in any deployed environment.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pokemon_tcg}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:adminpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

## Spring JPA ##
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

## Flyway ##
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

logging.level.root=INFO
logging.level.org.flywaydb=DEBUG

##### PokemonTCG External API #####
pokemontcg.api.base-url=https://api.pokemontcg.io/v2

##### Application properties #####
app.name=Pokemon TCG API
app.version=1.0.0
app.desc=API para el juego de cartas de Pokemon
app.url=http://localhost:8081
app.dev-name=Marti & Team
app.dev-email=tuemail@utn.frc.edu.ar

##### JWT Properties #####
# Override JWT_SECRET in production via env var; the literal below is dev-only.
jwt.secret=${JWT_SECRET:MySuperSecretKeyForPokemonTcgGame1234567890!}
jwt.expiration=${JWT_EXPIRATION_MS:36000000}

##### Match runtime config (XY1 §6 abandonment timer) #####
# Seconds before a disconnected player forfeits the match.
match.abandon.timeout-seconds=${MATCH_ABANDON_TIMEOUT_SECONDS:60}
