## Dev profile: H2 file-based database (persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/pokemon_tcg;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

## H2 console (useful for dev debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

## Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
