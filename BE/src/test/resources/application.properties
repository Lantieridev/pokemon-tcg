##### Application properties #####
app.name=Pokemon TCG API
app.desc=API para el juego de cartas de Pokemon
app.version=1.0.0
app.url=http://localhost:8080
app.dev-name=lantieridev
app.dev-email=lantieridev@users.noreply.github.com

#####  SPRING DOC PROPERTIES #####
springdoc.packages-to-scan=ar.edu.utn.frc.tup.piii.controllers
springdoc.show-actuator=true
springdoc.swagger-ui.disable-swagger-default-url=true
# swagger-ui custom path
springdoc.swagger-ui.path=/swagger-ui.html

## Spring Data Source ##
spring.datasource.url=jdbc:h2:mem:test2;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

## Spring JPA ##
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=none

## Flyway ##
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=false


##### PokemonTCG External API #####
pokemontcg.api.base-url=https://api.pokemontcg.io/v2

##### JWT Properties #####
jwt.secret=MySuperSecretKeyForPokemonTcgGame1234567890!
jwt.expiration=36000000
