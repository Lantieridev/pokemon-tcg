project: tpi-pokemon-2w1-15
initialized_at: 2026-05-17
artifact_store: hybrid

stack:
  backend: Java 21 + Spring Boot 4.0.0
  build: Maven
  build_file: BE/pom.xml
  testing: JUnit 5 + Mockito (via spring-boot-starter-test)
  frontend: Angular 21+
  language: Java
  db: PostgreSQL (runtime/prod), H2 (test profile), JPA/Hibernate
  migrations: Flyway
  security: Spring Security + JWT (jjwt)
  extras:
    - Lombok 1.18.30
    - ModelMapper 3.1.1
    - Checkstyle (.code_quality/checkstyle_rules.xml)
    - PMD (.code_quality/pmd_rules.xml)
    - SpringDoc OpenAPI 2.8.0

strict_tdd: true
test_command: mvn test
# JaCoCo gate is actually 3-tier (see BE/pom.xml): 90% line + 85% branch scoped to engine/**,
# plus a 75% instruction floor project-wide. This is the strictest tier, not the whole gate.
coverage_target: 90%

architecture:
  engine_isolation: true
  fail_fast: true
  patterns:
    - Strategy    # AbilityEffect implementations (BigJumpStrategy, DriveOffStrategy, etc.)
    - State       # TurnPhase sealed interface (DrawPhase/MainPhase/AttackPhase/...)
    - Chain of Responsibility  # engine/pipeline/ — AttackPipelineStep, 9 concrete steps
    - Observer    # TurnManager.registerListener/PhaseListener/PhaseEvent
  layers:
    - domain/model
    - service/engine
    - ui/console
  engine_components:
    - TurnManager       # State Pattern (DRAW, MAIN, ATTACK, BETWEEN_TURNS) + Observer (PhaseListener)
    - RuleValidator     # isValidAction(Action, GameState)
    - AttackPipeline    # Chain of Responsibility — 9 steps (ValidationStep..PostDamageEffectsStep)
    - DamageCalculator  # stateless, fixed 6-step arithmetic formula (not a chain of handlers)
    - StatusEffectManager  # mutually exclusive: Dormido/Confundido/Paralizado; coexist: Quemado+Envenenado
    - VictoryConditionChecker  # prize cards, no bench, empty deck

conventions:
  commits: Conventional Commits (feat/fix/test/docs/refactor/style/chore)
  repo_ownership: solo (personal portfolio repo — no team review process; see CONTRIBUTING.md)
  branching: direct commits to main, or short-lived feature branches for larger changes
  naming:
    classes: PascalCase
    methods: camelCase
    constants: UPPER_SNAKE_CASE
  collections: declared as interfaces (List<T>, Map<K,V>, Set<T>)
  domain_exceptions:
    - NotEnoughEnergyException
    - InvalidTurnPhaseException
    - PokemonAsleepException
  no_null_returns: true
  db_migrations: no manual schema changes

testing_constraints:
  - no Spring context in engine tests (pure POJOs only)
  - test method naming: shouldVerbWhenCondition()
  - prefer pure state objects over mocks
  - Mockito allowed for Scanner and external components
  - JUnit 5 required for all tests
  - code_quality_gates: Checkstyle + PMD on mvn compile/verify
