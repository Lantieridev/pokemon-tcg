version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: pokemon-tcg-db
    environment:
      POSTGRES_DB: pokemon_tcg
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: pokemon-tcg-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
